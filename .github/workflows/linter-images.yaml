name: Linter images

# Additive CI for the in-repo Qodana linter images (qodana-jvm/android/clang). Separate from the
# stock `CI` workflow's `Qodana` gate — this builds each IMAGE from this tree (CLI_SOURCE=context)
# and runs the in-tree e2e fixtures against it the way a real customer would (the @Tag("linter-e2e")
# harness). amd64-only, so it is the sole place those docker-driving tests run — the arm64 dev box
# cannot. Path-filtered to the image build system so unrelated PRs don't pay for native compiles +
# image builds + scans.

on:
  pull_request:
    paths:
      - linter-images/**
      - .github/workflows/linter-images.yaml
  push:
    branches: [main]
    paths:
      - linter-images/**
      - .github/workflows/linter-images.yaml
  workflow_dispatch: {}

concurrency:
  group: linter-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # resolve + hadolint runs as a prek hook (.pre-commit-config.yaml), locally and in CI's prek step —
  # not as a job here. The image-tool unit tests (incl. the pure e2e-harness tests: manifest/planner/
  # evaluator) run in the stock `Test` job (./gradlew test). Only the @Tag("linter-e2e") docker runs
  # live here, behind a per-image build.

  e2e:
    # One job per image. Each cell builds ITS image from this tree, then runs the harness scoped to
    # that image (-Dlinter.e2e.image), so a build/scan/assert failure surfaces in — and only in — the
    # relevant image's job. fail-fast:false keeps the three signals independent.
    name: Docker e2e (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        image:
          # compose_files: the exact `-f` flags for `docker compose` (repo-root-relative).
          # token_gated: clang's clang-tidy comes from the PRIVATE mirror, so both its build and its
          # e2e require QODANA_CLI_DEPS_TOKEN; on a fork PR the secret is empty → no-op, not red.
          - name: qodana-jvm
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
          - name: qodana-android
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
          - name: qodana-clang
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "true"
    env:
      # QODANA_CLI_DEPS_TOKEN is surfaced as `env.*` so the clang gating `if:` can reference it
      # (`secrets.*` is not addressable in a step-level `if:`). QODANA_TOKEN feeds the harness's
      # `linterE2eTest` task (forwarded to the test JVM); it auto-uploads scans to a throwaway Qodana
      # Cloud project when present. The DOCKER_READ_PUBLIC_REGISTRY_* creds authenticate the docker.io
      # and dhi.io pulls (see the two login steps below).
      DOCKER_READ_PUBLIC_REGISTRY_TOKEN: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      DOCKER_READ_PUBLIC_REGISTRY_USER: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
      QODANA_CLI_DEPS_TOKEN: ${{ secrets.QODANA_CLI_DEPS_TOKEN }}
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      # GraalVM + Gradle for the from-tree native CLI (assembleRelease → nativeCompile) and the harness.
      - uses: ./.github/actions/setup-native-build
      - name: Docker Hub login (raise anonymous pull-rate ceiling)
        # An authenticated docker.io pull raises the anonymous rate ceiling for the public images the
        # build fetches (dockerfile-x frontend, amazoncorretto).
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      - name: dhi.io login (Docker Hardened Images base)
        # QD_BASE_IMAGE is dhi.io/debian-base; authenticate the pull with the same credentials. No
        # if-gate: the base is mandatory, so a missing credential must fail loudly here, not skip.
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}

      # --- Non-token-gated images (jvm, android): stage contexts, build, run the harness. --------------
      - name: Stage from-tree contexts (cli + image-tool)
        if: ${{ matrix.image.token_gated != 'true' }}
        # CI tests the code under review: the inner CLI is the from-tree binary (CLI_SOURCE=context),
        # the `tooling` image-tool comes from installDist. compose.ci.yaml binds the `cli` context to
        # qodana-cli/build/release-staging; install-cli reads /cli-src/${CLI_BINARY} there.
        run: |
          set -euo pipefail
          ./gradlew \
            :qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=amd64 -Pquick=true \
            :linter-images:installDist
          # qodana-jvm/android consume /cli-src/qodana (Cli kind already staged at release-staging/qodana).
          test -x qodana-cli/build/release-staging/qodana
      - name: Build ${{ matrix.image.name }}
        if: ${{ matrix.image.token_gated != 'true' }}
        # No token: jvm/android fetch the IDE dist from the public mirror (GPG+sha256 verified).
        run: docker compose ${{ matrix.image.compose_files }} build ${{ matrix.image.name }}
      - name: e2e ${{ matrix.image.name }}
        if: ${{ matrix.image.token_gated != 'true' }}
        # Builds the @Tag("linter-e2e") harness, discovers fixtures under
        # linter-images/e2e/fixtures/${image}/*/expected.json, scans the pre-built <image>:dev, and
        # asserts SARIF content + exit code + log gate. Missing/unparseable SARIF or Docker-down → loud.
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}

      # --- Token-gated image (clang): identical flow, but build + e2e require the mirror token. --------
      - name: Stage from-tree contexts (cli + image-tool + clang binary)
        if: ${{ matrix.image.token_gated == 'true' && env.QODANA_CLI_DEPS_TOKEN != '' }}
        run: |
          set -euo pipefail
          ./gradlew \
            :qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=amd64 -Pquick=true \
            :qodana-clang:assembleRelease -PtargetOs=linux -PtargetArch=amd64 -Pquick=true \
            :linter-images:installDist
          test -x qodana-cli/build/release-staging/qodana
          # clang's inner CLI is qodana-clang (Tool kind: a raw binary qodana-clang_<version>_linux_amd64,
          # NOT staged). Place it at release-staging/qodana-clang so /cli-src/qodana-clang resolves.
          shopt -s nullglob
          tool_binaries=(qodana-clang/build/release/qodana-clang_*_linux_amd64)
          if [ "${#tool_binaries[@]}" -ne 1 ]; then
            echo "::error::expected exactly one qodana-clang tool binary, found ${#tool_binaries[@]}: ${tool_binaries[*]:-<none>}"
            exit 1
          fi
          cp "${tool_binaries[0]}" qodana-cli/build/release-staging/qodana-clang
          chmod 0755 qodana-cli/build/release-staging/qodana-clang
      - name: Build ${{ matrix.image.name }} (token-gated clang-tidy mirror)
        # clang's clang-tidy comes from the PRIVATE qodana-cli-deps mirror, so its build REQUIRES the
        # token (lib/tools.dockerfile mounts the secret required=true). On a fork PR the secret is
        # empty → skip rather than hard-fail; same-repo PRs and pushes build + scan it.
        if: ${{ matrix.image.token_gated == 'true' && env.QODANA_CLI_DEPS_TOKEN != '' }}
        run: docker compose ${{ matrix.image.compose_files }} build ${{ matrix.image.name }}
      - name: e2e ${{ matrix.image.name }} (token-gated)
        if: ${{ matrix.image.token_gated == 'true' && env.QODANA_CLI_DEPS_TOKEN != '' }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: Note skipped ${{ matrix.image.name }} (no token)
        if: ${{ matrix.image.token_gated == 'true' && env.QODANA_CLI_DEPS_TOKEN == '' }}
        run: echo "::notice::${{ matrix.image.name }} e2e skipped — QODANA_CLI_DEPS_TOKEN unavailable (fork PR)."
