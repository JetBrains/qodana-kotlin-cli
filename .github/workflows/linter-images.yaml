name: Linter images

# Additive CI for the in-repo Qodana linter images (qodana-jvm/android/clang). Separate from the
# stock `CI` workflow's `Qodana` gate — this builds each IMAGE from this tree (CLI_SOURCE=context)
# and runs the in-tree e2e fixtures against it the way a real customer would (the @Tag("linter-e2e")
# harness). amd64-only, so it is the sole place those docker-driving tests run — the arm64 dev box
# cannot. Path-filtered to the image build system so unrelated PRs don't pay for native compiles +
# image builds + scans.

on:
  pull_request:
    paths:
      - linter-images/**
      - .github/workflows/linter-images.yaml
  push:
    branches: [main]
    paths:
      - linter-images/**
      - .github/workflows/linter-images.yaml
  workflow_dispatch: {}

concurrency:
  group: linter-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # resolve + hadolint runs as a prek hook (.pre-commit-config.yaml), locally and in CI's prek step —
  # not as a job here. The image-tool unit tests (incl. the pure e2e-harness tests: manifest/planner/
  # evaluator) run in the stock `Test` job (./gradlew test). Only the @Tag("linter-e2e") docker runs
  # live here, behind a per-image build.
  #
  # The matrix is partitioned across two jobs by trust boundary:
  #   * e2e               — public images whose build + scan need no private-feed token. Unauthenticated;
  #                         a fork PR runs it without approval.
  #   * e2e-internal-feed — images that read the PRIVATE JetBrains Space packages (clang/cdnet's
  #                         clang-tidy mirror; later the internal nightly-dist jvm). A fork PR gets no
  #                         repo secrets, so this job references the `jetbrains-internal` Environment (only
  #                         on fork PRs) and pauses for maintainer approval, which unlocks the env secrets.
  #                         An empty token there fails RED (fail-loud, QD-15165), never no-ops. Same-repo
  #                         PRs, pushes, and workflow_dispatch use the repo secrets directly — no
  #                         environment, no gate (the conditional `environment:` evaluates to '').
  #                         One-time Environment setup: linter-images/docs/jetbrains-internal-environment.md.

  e2e:
    # One job per public image. Each cell builds ITS image from this tree, then runs the harness scoped
    # to that image (-Dlinter.e2e.image), so a build/scan/assert failure surfaces in — and only in — the
    # relevant image's job. fail-fast:false keeps the signals independent.
    name: Docker e2e (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        image:
          # compose_files: the exact `-f` flags for `docker compose` (repo-root-relative).
          # requires_license: this image's e2e fixture passes QODANA_LICENSE_ONLY_TOKEN via passEnv (a
          # paid IDE-dist linter), so the scan step is gated on that secret — fork PRs (empty secret)
          # skip it instead of hard-failing at planning time.
          - name: qodana-jvm
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            requires_license: "true"
          - name: qodana-jvm-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "false"
          - name: qodana-android
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "false"
          - name: qodana-android-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "false"
          - name: qodana-python-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "false"
          - name: qodana-python
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-js
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-go
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-php
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-rust
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "false"
          - name: qodana-ruby
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-ruby-3.2
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-ruby-3.4
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-dotnet
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
          - name: qodana-cpp
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            requires_license: "true"
    env:
      # QODANA_LICENSE_ONLY_TOKEN licenses the paid IDE-dist linters at scan time in license-only mode
      # (no upload); surfaced as `env.*` so the paid-image fork-PR gate can reference it (`secrets.*` is
      # not addressable in a step-level `if:`). DOCKER_READ_PUBLIC_REGISTRY_* authenticate the docker.io
      # and dhi.io base pulls.
      DOCKER_READ_PUBLIC_REGISTRY_TOKEN: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      DOCKER_READ_PUBLIC_REGISTRY_USER: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
      QODANA_LICENSE_ONLY_TOKEN: ${{ secrets.QODANA_LICENSE_ONLY_TOKEN }}
    steps:
      # Each cell builds a multi-GB image AND runs a full IDE scan on one ~14 GB-free ubuntu-latest;
      # the dotnet/android toolchains exhaust the disk (QD-15127, intermittent ENOSPC / index-flush).
      # Reclaim the preinstalled runner toolchains this job never uses — each linter image provisions
      # its own SDK/runtime inside the container, so the host copies are dead weight here. Keep the
      # swap file (swap-storage: false): reclaiming it trades ~4 GB of disk for zero swap headroom on
      # a memory-heavy scan, and the ~25 GB freed from toolchains is ample without it.
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: false
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      # GraalVM + Gradle for the from-tree native CLI (assembleRelease → nativeCompile) and the harness.
      - uses: ./.github/actions/setup-native-build
      - name: Docker Hub login (raise anonymous pull-rate ceiling)
        # An authenticated docker.io pull raises the anonymous rate ceiling for the public images the
        # build fetches (dockerfile-x frontend, amazoncorretto).
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      - name: dhi.io login (Docker Hardened Images base)
        # QD_BASE_IMAGE is a dhi.io OS or language base (debian-base for jvm/android/python, node for
        # js); this login authenticates the whole dhi.io registry with the same credentials. No if-gate:
        # the base is mandatory, so a missing credential must fail loudly here, not skip.
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      - name: Stage from-tree contexts (cli + image-tool)
        # CI tests the code under review: the inner CLI is the from-tree binary (CLI_SOURCE=context),
        # the `tooling` image-tool comes from installDist. compose.ci.yaml binds the `cli` context to
        # qodana-cli/build/release-staging; install-cli reads /cli-src/${CLI_BINARY} there.
        run: |
          set -euo pipefail
          ./gradlew \
            :qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=amd64 -Pquick=true \
            :linter-images:installDist
          # qodana-jvm/android consume /cli-src/qodana (Cli kind already staged at release-staging/qodana).
          test -x qodana-cli/build/release-staging/qodana
      - name: Build ${{ matrix.image.name }}
        # No token: these images fetch the IDE dist from the public mirror (GPG+sha256 verified).
        run: |
          docker compose ${{ matrix.image.compose_files }} build ${{ matrix.image.name }}
          # Reclaim the BuildKit cache (a near-duplicate of the image layers) before the scan; the
          # built <image>:dev survives — the e2e step runs it, never rebuilds (QD-15127).
          docker builder prune -af
      - name: e2e ${{ matrix.image.name }} (free)
        if: ${{ matrix.image.requires_license != 'true' }}
        # Builds the @Tag("linter-e2e") harness, discovers fixtures under
        # linter-images/e2e/fixtures/${image}/*/expected.json, scans the pre-built <image>:dev, and
        # asserts SARIF content + exit code + log gate. Missing/unparseable SARIF or Docker-down → loud.
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: e2e ${{ matrix.image.name }} (licensed)
        # Paid IDE-dist linters license over the bridge network in license-only mode. On a fork PR the
        # secret is empty → skip rather than hard-fail (the harness fails loudly on a missing passEnv).
        if: ${{ matrix.image.requires_license == 'true' && env.QODANA_LICENSE_ONLY_TOKEN != '' }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: Note skipped ${{ matrix.image.name }} (no license token)
        if: ${{ matrix.image.requires_license == 'true' && env.QODANA_LICENSE_ONLY_TOKEN == '' }}
        run: echo "::notice::${{ matrix.image.name }} e2e skipped — QODANA_LICENSE_ONLY_TOKEN unavailable (fork PR)."
      - name: Upload e2e artifacts (idea.log + sarif)
        # Always upload whatever the harness archived to build/linter-e2e-artifacts (idea.log + SARIF per
        # case), so a failing scan's real cause is downloadable. if-no-files-found:ignore covers skipped
        # cells (no artifacts produced).
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ matrix.image.name }}
          path: linter-images/build/linter-e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 14

  e2e-internal-feed:
    # clang/cdnet read the PRIVATE qodana-cli-deps mirror, so build + e2e require
    # QODANA_READ_SPACE_PACKAGES_TOKEN. Same per-image isolation and fail-fast:false as the e2e job; the
    # distinct check name keeps these cells addressable (e.g. for required-status config) apart from the
    # public Docker e2e cells.
    name: Docker e2e internal-feed (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Reference the `jetbrains-internal` Environment ONLY for fork PRs: a fork PR gets no repo secrets, so
    # the environment's required-reviewer approval is what unlocks the private-feed token (+ docker creds).
    # Same-repo PRs, pushes, and workflow_dispatch evaluate to '' (no environment) and use the repo
    # secrets directly — no approval gate, behavior unchanged. The event_name guard keeps a push (null
    # pull_request.head.repo) from matching.
    environment: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'jetbrains-internal' || '' }}
    strategy:
      fail-fast: false
      matrix:
        image:
          # token_gated: clang/cdnet's clang-tidy/CLT comes from the PRIVATE Space mirror, so build + e2e
          # require QODANA_READ_SPACE_PACKAGES_TOKEN; an empty token fails RED at the "Require mirror token"
          # gate, never no-ops (fail-loud, QD-15165). feed_required: the internal nightly-dist gate (future
          # jvm); off until the jvm repoint flips it to "true".
          - name: qodana-clang
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "true"
            feed_required: "false"
          - name: qodana-cdnet
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "true"
            feed_required: "false"
    env:
      # QODANA_READ_SPACE_PACKAGES_TOKEN reads the private JetBrains Space packages (the qodana-cli-deps
      # clang-tidy mirror; later the internal nightly dist feed). Surfaced as `env.*` so the hard-fail
      # gates' `if:`s can reference it (`secrets.*` is not addressable in a step `if:`). On a fork PR it
      # resolves to the jetbrains-internal environment secret (after approval); otherwise the repo secret.
      # DOCKER_READ_PUBLIC_REGISTRY_* authenticate the docker.io/dhi.io base pulls and must ALSO exist as
      # environment secrets so the approved-fork path can log in.
      DOCKER_READ_PUBLIC_REGISTRY_TOKEN: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      DOCKER_READ_PUBLIC_REGISTRY_USER: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
      QODANA_READ_SPACE_PACKAGES_TOKEN: ${{ secrets.QODANA_READ_SPACE_PACKAGES_TOKEN }}
    steps:
      # Shared runner setup, identical to the e2e job (see there for the per-step rationale).
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: false
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-native-build
      - name: Docker Hub login (raise anonymous pull-rate ceiling)
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      - name: dhi.io login (Docker Hardened Images base)
        # clang's base is a dhi.io debian-base; authenticate the whole dhi.io registry with the same
        # credentials. No if-gate: the base is mandatory, so a missing credential must fail loudly.
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}

      - name: Require feed token for internal-feed images
        # Same fail-loud contract as the mirror-token gate below: an internal-feed image
        # (feed_required=="true") with an empty QODANA_READ_SPACE_PACKAGES_TOKEN fails RED, never no-ops.
        # On a fork PR an empty token means the run was not maintainer-approved (the jetbrains-internal
        # environment supplies it). Off for every cell until the jvm repoint flips feed_required to "true".
        if: ${{ matrix.image.feed_required == 'true' && env.QODANA_READ_SPACE_PACKAGES_TOKEN == '' }}
        run: |
          echo "::error::QODANA_READ_SPACE_PACKAGES_TOKEN is required for ${{ matrix.image.name }} (internal nightly feed) but is empty."
          echo "On a fork PR this means the run was not approved by a maintainer (see the jetbrains-internal environment)."
          exit 1
      - name: Require mirror token for token-gated images
        # Symmetric with the feed_required gate above: a token-gated image (clang/cdnet) with an empty
        # QODANA_READ_SPACE_PACKAGES_TOKEN fails RED, never no-ops. Its clang-tidy/CLT comes from the
        # private Space mirror, so an empty token can't build/scan; on a fork PR it means the run was not
        # maintainer-approved. Re-run from a same-repo branch (the secret is repo-scoped).
        if: ${{ matrix.image.token_gated == 'true' && env.QODANA_READ_SPACE_PACKAGES_TOKEN == '' }}
        run: |
          echo "::error::QODANA_READ_SPACE_PACKAGES_TOKEN is required for ${{ matrix.image.name }} (private clang-tidy/CLT mirror) but is empty."
          echo "On a fork PR this means the run was not approved by a maintainer; re-run from a same-repo branch."
          exit 1
      - name: Stage from-tree contexts (cli + image-tool + ${{ matrix.image.name }} binary)
        if: ${{ matrix.image.token_gated == 'true' }}
        run: |
          set -euo pipefail
          ./gradlew \
            :qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=amd64 -Pquick=true \
            :${{ matrix.image.name }}:assembleRelease -PtargetOs=linux -PtargetArch=amd64 -Pquick=true \
            :linter-images:installDist
          test -x qodana-cli/build/release-staging/qodana
          # The token-gated images' inner CLI is a Tool-kind raw binary <module>_<version>_linux_amd64
          # (NOT staged). Place it at release-staging/<module> so /cli-src/<module> resolves. Parameterized
          # on matrix.image.name so each cell (clang, cdnet) stages ITS own binary.
          shopt -s nullglob
          tool_binaries=(${{ matrix.image.name }}/build/release/${{ matrix.image.name }}_*_linux_amd64)
          if [ "${#tool_binaries[@]}" -ne 1 ]; then
            echo "::error::expected exactly one ${{ matrix.image.name }} tool binary, found ${#tool_binaries[@]}: ${tool_binaries[*]:-<none>}"
            exit 1
          fi
          cp "${tool_binaries[0]}" "qodana-cli/build/release-staging/${{ matrix.image.name }}"
          chmod 0755 "qodana-cli/build/release-staging/${{ matrix.image.name }}"
      - name: Build ${{ matrix.image.name }} (token-gated clang-tidy mirror)
        # clang's clang-tidy comes from the PRIVATE qodana-cli-deps mirror, so its build REQUIRES the
        # token (lib/tools.dockerfile mounts the secret required=true). An empty token already failed the
        # run at the "Require mirror token" gate above; same-repo PRs, pushes, and approved fork PRs build
        # + scan it.
        if: ${{ matrix.image.token_gated == 'true' }}
        run: |
          docker compose ${{ matrix.image.compose_files }} build ${{ matrix.image.name }}
          # Reclaim the BuildKit cache (a near-duplicate of the image layers) before the scan; the
          # built <image>:dev survives — the e2e step runs it, never rebuilds (QD-15127).
          docker builder prune -af
      - name: e2e ${{ matrix.image.name }} (token-gated)
        if: ${{ matrix.image.token_gated == 'true' }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: Upload e2e artifacts (idea.log + sarif)
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ matrix.image.name }}
          path: linter-images/build/linter-e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 14
