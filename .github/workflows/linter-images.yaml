name: Linter images

# Additive CI for the in-repo Qodana linter images (qodana-jvm/android/clang). Separate from the
# stock `CI` workflow's `Qodana` gate — this builds each IMAGE from this tree (CLI_SOURCE=context)
# and runs the in-tree e2e fixtures against it the way a real customer would (the @Tag("linter-e2e")
# harness). CI-only: the docker-driving suite can't run on the arm64 dev box. The arch-capable images
# (the `ArchContract.archCapable` set) also run arm64 e2e on `ubuntu-24.04-arm` runners (QD-15171); the
# rest stay amd64-only. Path-filtered to the image build system so unrelated PRs don't pay for native
# compiles + image builds + scans.

on:
  pull_request:
    paths:
      - linter-images/**
      - .github/workflows/linter-images.yaml
  push:
    branches: [main]
    paths:
      - linter-images/**
      - .github/workflows/linter-images.yaml
  workflow_dispatch: {}

concurrency:
  group: linter-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # resolve + hadolint runs as a prek hook (.pre-commit-config.yaml), locally and in CI's prek step —
  # not as a job here. The image-tool unit tests (incl. the pure e2e-harness tests: manifest/planner/
  # evaluator) run in the stock `Test` job (./gradlew test). Only the @Tag("linter-e2e") docker runs
  # live here, behind a per-image build.

  e2e:
    # One job per image. Each cell builds ITS image from this tree, then runs the harness scoped to
    # that image (-Dlinter.e2e.image), so a build/scan/assert failure surfaces in — and only in — the
    # relevant image's job. fail-fast:false keeps the three signals independent.
    name: Docker e2e (${{ matrix.image.name }}, linux/${{ matrix.image.arch }})
    runs-on: ${{ matrix.image.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        image:
          # compose_files: the exact `-f` flags for `docker compose` (repo-root-relative).
          # token_gated: clang's clang-tidy comes from the PRIVATE mirror, so both its build and its
          # e2e require QODANA_READ_SPACE_PACKAGES_TOKEN; an empty secret (e.g. a fork PR) fails RED, never no-ops.
          # requires_license: this image's e2e fixture passes QODANA_LICENSE_ONLY_TOKEN via passEnv (a
          # paid IDE-dist linter), so the scan step is gated on that secret — fork PRs (empty secret)
          # skip it instead of hard-failing at planning time. Flip to "true" in the commit that adds the
          # image's passEnv fixture.
          - name: qodana-jvm
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "true"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-jvm
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "true"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-jvm-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "true"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-jvm-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "true"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-android
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "true"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-android-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "true"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-python-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-python-community
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-python
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-python
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-js
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-js
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-go
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-go
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-php
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-php
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-rust
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-rust
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "false"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-ruby
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-ruby
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-ruby-3.2
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-ruby-3.2
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-ruby-3.4
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-ruby-3.4
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: arm64
            runner: ubuntu-24.04-arm
          - name: qodana-dotnet
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-cpp
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-clang
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "true"
            requires_license: "false"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-cdnet
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "true"
            requires_license: "false"
            feed_required: "false"
            arch: amd64
            runner: ubuntu-latest
    env:
      # QODANA_READ_SPACE_PACKAGES_TOKEN reads the private JetBrains Space packages — the qodana-cli-deps
      # mirror (clang/cdnet) AND the internal nightly dist feed (jvm). Surfaced as `env.*` so the
      # clang/cdnet hard-fail and the feed_required hard-fail `if:`s can reference it (`secrets.*` is not
      # addressable in a step-level `if:`). QODANA_LICENSE_ONLY_TOKEN licenses the paid IDE-dist linters
      # at scan time in license-only mode (no upload); likewise surfaced as `env.*` for the paid-image
      # fork-PR gate. The DOCKER_READ_PUBLIC_REGISTRY_* creds authenticate the docker.io and dhi.io pulls.
      DOCKER_READ_PUBLIC_REGISTRY_TOKEN: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      DOCKER_READ_PUBLIC_REGISTRY_USER: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
      QODANA_READ_SPACE_PACKAGES_TOKEN: ${{ secrets.QODANA_READ_SPACE_PACKAGES_TOKEN }}
      QODANA_LICENSE_ONLY_TOKEN: ${{ secrets.QODANA_LICENSE_ONLY_TOKEN }}
    steps:
      # Each cell builds a multi-GB image AND runs a full IDE scan on one ~14 GB-free ubuntu-latest;
      # the dotnet/android toolchains exhaust the disk (QD-15127, intermittent ENOSPC / index-flush).
      # Reclaim the preinstalled runner toolchains this job never uses — each linter image provisions
      # its own SDK/runtime inside the container, so the host copies are dead weight here. Keep the
      # swap file (swap-storage: false): reclaiming it trades ~4 GB of disk for zero swap headroom on
      # a memory-heavy scan, and the ~25 GB freed from toolchains is ample without it.
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: false
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      # GraalVM + Gradle for the from-tree native CLI (assembleRelease → nativeCompile) and the harness.
      - uses: ./.github/actions/setup-native-build
      - name: Docker Hub login (raise anonymous pull-rate ceiling)
        # An authenticated docker.io pull raises the anonymous rate ceiling for the public images the
        # build fetches (dockerfile-x frontend, amazoncorretto).
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      - name: dhi.io login (Docker Hardened Images base)
        # QD_BASE_IMAGE is a dhi.io OS or language base (debian-base for jvm/android/python/clang,
        # node for js); this login authenticates the whole dhi.io registry with the same credentials. No
        # if-gate: the base is mandatory, so a missing credential must fail loudly here, not skip.
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}

      - name: Require feed token for internal-feed images
        # Same fail-loud contract as the clang/cdnet mirror-token gate below: an internal-feed image (feed_required=="true") with an
        # empty QODANA_READ_SPACE_PACKAGES_TOKEN fails RED, never no-ops. On a fork PR an empty token means the run was not
        # maintainer-approved (the internal-feed environment supplies it). Active for qodana-jvm (internal
        # nightly feed); off for the public-feed cells.
        if: ${{ matrix.image.feed_required == 'true' && env.QODANA_READ_SPACE_PACKAGES_TOKEN == '' }}
        run: |
          echo "::error::QODANA_READ_SPACE_PACKAGES_TOKEN is required for ${{ matrix.image.name }} (internal nightly feed) but is empty."
          echo "On a fork PR this means the run was not approved by a maintainer (see the internal-feed environment)."
          exit 1
      - name: Require mirror token for token-gated images
        # Symmetric with the feed_required gate above: a token-gated image (clang/cdnet) with an empty
        # QODANA_READ_SPACE_PACKAGES_TOKEN fails RED, never no-ops. Its clang-tidy/CLT comes from the
        # private Space mirror, so an empty token can't build/scan; on a fork PR it means the run was not
        # maintainer-approved. Re-run from a same-repo branch (the secret is repo-scoped).
        if: ${{ matrix.image.token_gated == 'true' && env.QODANA_READ_SPACE_PACKAGES_TOKEN == '' }}
        run: |
          echo "::error::QODANA_READ_SPACE_PACKAGES_TOKEN is required for ${{ matrix.image.name }} (private clang-tidy/CLT mirror) but is empty."
          echo "On a fork PR this means the run was not approved by a maintainer; re-run from a same-repo branch."
          exit 1
      # --- Non-token-gated images (jvm, android): stage contexts, build, run the harness. --------------
      - name: Stage from-tree contexts (cli + image-tool)
        if: ${{ matrix.image.token_gated != 'true' }}
        # CI tests the code under review: the inner CLI is the from-tree binary (CLI_SOURCE=context),
        # the `tooling` image-tool comes from installDist. compose.ci.yaml binds the `cli` context to
        # qodana-cli/build/release-staging; install-cli reads /cli-src/${CLI_BINARY} there.
        run: |
          set -euo pipefail
          ./gradlew \
            :qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=${{ matrix.image.arch }} -Pquick=true \
            :linter-images:installDist
          # qodana-jvm/android consume /cli-src/qodana (Cli kind already staged at release-staging/qodana).
          test -x qodana-cli/build/release-staging/qodana
          # Fail-closed: the staged binary's ELF machine MUST match matrix.image.arch (nativeCompile is
          # host-arch; -PtargetArch is only a label, so a arch/runner mismatch would ship a wrong-arch CLI).
          want='${{ matrix.image.arch }}'
          got="$(file -b qodana-cli/build/release-staging/qodana)"
          case "$want" in
            amd64) echo "$got" | grep -q 'x86-64' || { echo "::error::staged CLI is not x86-64 (arch=$want): $got"; exit 1; } ;;
            arm64) echo "$got" | grep -q 'aarch64'  || { echo "::error::staged CLI is not aarch64 (arch=$want): $got"; exit 1; } ;;
            *) echo "::error::unexpected matrix arch '$want'"; exit 1 ;;
          esac
      - name: Build ${{ matrix.image.name }}
        if: ${{ matrix.image.token_gated != 'true' }}
        # Public-feed images fetch the IDE dist from the public mirror (GPG+sha256). Internal-feed images
        # (qodana-jvm) add compose.private.yaml, so the space_packages_token secret is mounted required=false
        # and they pull the internal nightly verified sha256-only — the job-level token supplies it.
        run: |
          docker compose ${{ matrix.image.compose_files }} build ${{ matrix.image.name }}
          # Reclaim the BuildKit cache (a near-duplicate of the image layers) before the scan; the
          # built <image>:dev survives — the e2e step runs it, never rebuilds (QD-15127).
          docker builder prune -af
      - name: e2e ${{ matrix.image.name }} (free)
        if: ${{ matrix.image.token_gated != 'true' && matrix.image.requires_license != 'true' }}
        # Builds the @Tag("linter-e2e") harness, discovers fixtures under
        # linter-images/e2e/fixtures/${image}/*/expected.json, scans the pre-built <image>:dev, and
        # asserts SARIF content + exit code + log gate. Missing/unparseable SARIF or Docker-down → loud.
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: e2e ${{ matrix.image.name }} (licensed)
        # Paid IDE-dist linters license over the bridge network in license-only mode. On a fork PR the
        # secret is empty → skip rather than hard-fail (the harness fails loudly on a missing passEnv).
        if: ${{ matrix.image.token_gated != 'true' && matrix.image.requires_license == 'true' && env.QODANA_LICENSE_ONLY_TOKEN != '' }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: Note skipped ${{ matrix.image.name }} (no license token)
        if: ${{ matrix.image.token_gated != 'true' && matrix.image.requires_license == 'true' && env.QODANA_LICENSE_ONLY_TOKEN == '' }}
        run: echo "::notice::${{ matrix.image.name }} e2e skipped — QODANA_LICENSE_ONLY_TOKEN unavailable (fork PR)."

      # --- Token-gated images (clang, cdnet): identical flow, but build + e2e require the mirror token. -
      - name: Stage from-tree contexts (cli + image-tool + ${{ matrix.image.name }} binary)
        if: ${{ matrix.image.token_gated == 'true' }}
        run: |
          set -euo pipefail
          ./gradlew \
            :qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=${{ matrix.image.arch }} -Pquick=true \
            :${{ matrix.image.name }}:assembleRelease -PtargetOs=linux -PtargetArch=${{ matrix.image.arch }} -Pquick=true \
            :linter-images:installDist
          test -x qodana-cli/build/release-staging/qodana
          # Fail-closed: the staged binary's ELF machine MUST match matrix.image.arch (nativeCompile is
          # host-arch; -PtargetArch is only a label, so a arch/runner mismatch would ship a wrong-arch CLI).
          want='${{ matrix.image.arch }}'
          got="$(file -b qodana-cli/build/release-staging/qodana)"
          case "$want" in
            amd64) echo "$got" | grep -q 'x86-64' || { echo "::error::staged CLI is not x86-64 (arch=$want): $got"; exit 1; } ;;
            arm64) echo "$got" | grep -q 'aarch64'  || { echo "::error::staged CLI is not aarch64 (arch=$want): $got"; exit 1; } ;;
            *) echo "::error::unexpected matrix arch '$want'"; exit 1 ;;
          esac
          # The token-gated images' inner CLI is a Tool-kind raw binary <module>_<version>_linux_amd64
          # (NOT staged). Place it at release-staging/<module> so /cli-src/<module> resolves. Parameterized
          # on matrix.image.name so each token-gated cell (clang, cdnet) stages ITS own binary.
          shopt -s nullglob
          tool_binaries=(${{ matrix.image.name }}/build/release/${{ matrix.image.name }}_*_linux_amd64)
          if [ "${#tool_binaries[@]}" -ne 1 ]; then
            echo "::error::expected exactly one ${{ matrix.image.name }} tool binary, found ${#tool_binaries[@]}: ${tool_binaries[*]:-<none>}"
            exit 1
          fi
          cp "${tool_binaries[0]}" "qodana-cli/build/release-staging/${{ matrix.image.name }}"
          chmod 0755 "qodana-cli/build/release-staging/${{ matrix.image.name }}"
      - name: Build ${{ matrix.image.name }} (token-gated clang-tidy mirror)
        # clang's clang-tidy comes from the PRIVATE qodana-cli-deps mirror, so its build REQUIRES the
        # token (lib/tools.dockerfile mounts the secret required=true). An empty token already failed the
        # run at the "Require mirror token" gate above; same-repo PRs and pushes build + scan it.
        if: ${{ matrix.image.token_gated == 'true' }}
        run: |
          docker compose ${{ matrix.image.compose_files }} build ${{ matrix.image.name }}
          # Reclaim the BuildKit cache (a near-duplicate of the image layers) before the scan; the
          # built <image>:dev survives — the e2e step runs it, never rebuilds (QD-15127).
          docker builder prune -af
      - name: e2e ${{ matrix.image.name }} (token-gated)
        if: ${{ matrix.image.token_gated == 'true' }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}

      - name: Upload e2e artifacts (idea.log + sarif)
        # Always upload whatever the harness archived to build/linter-e2e-artifacts (idea.log + SARIF per
        # case), so a failing scan's real cause is downloadable. if-no-files-found:ignore covers skipped
        # cells (no artifacts produced).
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ matrix.image.name }}-${{ matrix.image.arch }}
          path: linter-images/build/linter-e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 14

  release-smoke:
    # End-to-end proof the release overlay flips a dist: qodana-jvm defaults to the internal nightly feed,
    # so compose.release.yaml must flip it back to the public dist. CLI_SOURCE=context (compose.ci.yaml)
    # builds the from-tree CLI — no nightly-tag asset download. The job carries NO Space token, so a
    # silently-unapplied overlay falls back to the internal sha256 feed and fails RED. Functional steps are
    # gated on the FORK signal (not token presence): a same-repo run with broken creds fails loudly at
    # login (the e2e contract); a fork PR (no creds) skips. NOT a required check.
    name: Release-profile build smoke (qodana-jvm)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DOCKER_READ_PUBLIC_REGISTRY_TOKEN: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      DOCKER_READ_PUBLIC_REGISTRY_USER: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
    steps:
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: false
      - uses: actions/checkout@v6
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-native-build
        if: ${{ github.event.pull_request.head.repo.fork != true }}
      - name: Docker Hub login (raise anonymous pull-rate ceiling)
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      - name: dhi.io login (Docker Hardened Images base)
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          password: ${{ env.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
      - name: Stage from-tree contexts (cli + image-tool)
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        run: |
          ./gradlew \
            :qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=amd64 -Pquick=true \
            :linter-images:installDist
      - name: Build qodana-jvm via the release profile (public feed, GPG, no token)
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        run: docker compose -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.release.yaml build qodana-jvm
      - name: Note skipped (fork PR — no registry credentials)
        if: ${{ github.event.pull_request.head.repo.fork == true }}
        run: echo "::notice::release-smoke skipped on a fork PR (no registry credentials). The drift canary re-verifies the release pins."
