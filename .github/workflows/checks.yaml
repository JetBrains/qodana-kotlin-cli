name: Checks

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Run prek (commit-stage hooks)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-commit
      - name: Run prek (push-stage hooks — Gradle lint)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-push

  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      # No `ref:` override → checkout defaults to github.ref = the PR merge commit on pull_request, so CI builds against latest main.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      # Requires the QODANA_CI_ACTION_TOKEN secret on the repo (project token from
      # https://qodana.cloud). Without it the linter fails fast with
      # "Starting from 2023.2 release versions require connection to Qodana Cloud."
      # The env var stays QODANA_TOKEN (qodana-action's contract); only the secret it maps from changed.
      - uses: JetBrains/qodana-action@v2026.1.0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_CI_ACTION_TOKEN }}
        with:
          pr-mode: false
          post-pr-comment: true
          use-annotations: true
          upload-result: true
