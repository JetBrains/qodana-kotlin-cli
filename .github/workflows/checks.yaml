name: Checks

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify coverage runs only unit tests
        run: |
          graph="$(./gradlew :koverXmlReport -Pkover --dry-run)"
          if echo "$graph" | grep -Eq ':(parityTest|nativeBinaryTest|linterE2eTest)'; then
            echo "::error::coverage task graph pulled in a docker/native test task"; exit 1
          fi
      - name: Run tests with coverage
        run: ./gradlew :koverXmlReport -Pkover
      # JaCoCo-compatible XML: consumed by the Qodana job below AND published here so anyone can feed it
      # to a coverage tool (Codecov/Coveralls/SonarQube/…) or browse it — no extra service wired in.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: build/reports/kover/report.xml
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Run prek (commit-stage hooks)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-commit
      - name: Run prek (push-stage hooks — Gradle lint)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-push

  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    # Run even when test fails so a red/flaky test never suppresses the required Qodana check; coverage
    # is simply absent in that case (the download step below is gated on test success).
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      # No `ref:` override → checkout defaults to github.ref = the PR merge commit on pull_request, so CI builds against latest main.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      # Download only when test succeeded: on a red test there is no artifact and Qodana still scans
      # (coverage absent); on a green test a genuine download error surfaces instead of being swallowed.
      - name: Stage coverage for Qodana
        if: ${{ needs.test.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: .qodana/code-coverage
      # Requires the QODANA_CI_ACTION_TOKEN secret on the repo (project token from
      # https://qodana.cloud). Without it the linter fails fast with
      # "Starting from 2023.2 release versions require connection to Qodana Cloud."
      # The env var stays QODANA_TOKEN (qodana-action's contract); only the secret it maps from changed.
      - uses: JetBrains/qodana-action@v2026.1.0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_CI_ACTION_TOKEN }}
        with:
          # pr-mode:false → full-project scan + absolute (total) coverage. Fresh/diff coverage would need
          # pr-mode:true AND a PR-head checkout (not the merge ref above); deferred by decision.
          pr-mode: false
          post-pr-comment: true
          use-annotations: true
          upload-result: true
