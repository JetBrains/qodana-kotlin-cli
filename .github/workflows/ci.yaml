name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run prek (commit-stage hooks)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-commit
      - name: Run prek (push-stage hooks — Gradle lint)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-push

  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      # Requires the QODANA_TOKEN secret on the repo (project token from
      # https://qodana.cloud). Without it the linter fails fast with
      # "Starting from 2023.2 release versions require connection to Qodana Cloud."
      - uses: JetBrains/qodana-action@v2026.1.0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          post-pr-comment: true
          use-annotations: true
          upload-result: true

  native-build:
    name: "Build ${{ matrix.module }} (${{ matrix.platform.name }})"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux/amd64,   tag: linux-amd64,   runner: ubuntu-latest }
          - { name: linux/arm64,   tag: linux-arm64,   runner: ubuntu-24.04-arm }
          - { name: darwin/amd64,  tag: darwin-amd64,  runner: macos-15-intel }
          - { name: darwin/arm64,  tag: darwin-arm64,  runner: macos-15 }
          - { name: windows/amd64, tag: windows-amd64, runner: windows-latest }
        module: [qodana-cli, qodana-clang, qodana-cdnet]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
      - uses: gradle/actions/setup-gradle@v4
      - name: Native compile
        run: ./gradlew :${{ matrix.module }}:nativeCompile -Pquick=true
        shell: bash
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-${{ matrix.platform.tag }}
          path: |
            ${{ matrix.module }}/build/native/nativeCompile/${{ matrix.module }}
            ${{ matrix.module }}/build/native/nativeCompile/${{ matrix.module }}.exe
          if-no-files-found: error
          retention-days: 14
