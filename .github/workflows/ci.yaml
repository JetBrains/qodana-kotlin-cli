name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run prek (commit-stage hooks)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-commit
      - name: Run prek (push-stage hooks — Gradle lint)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-push

  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      # Requires the QODANA_TOKEN secret on the repo (project token from
      # https://qodana.cloud). Without it the linter fails fast with
      # "Starting from 2023.2 release versions require connection to Qodana Cloud."
      - uses: JetBrains/qodana-action@v2026.1.0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          post-pr-comment: true
          use-annotations: true
          upload-result: true

  native-build:
    name: "Build ${{ matrix.module }} (${{ matrix.platform.name }})"
    strategy:
      fail-fast: false
      matrix:
        # darwin-amd64 dropped: QD-14862. The IntelliJ DirectoryLock socket
        # inside the qodana-jvm-community linter container can't bind on
        # the Lima+QEMU+overlayfs stack that hosted macOS Intel runners
        # provide (JetBrains IJPL-161337 + IJPL-34916). Intel Mac users
        # should use the JVM CLI or upgrade to Apple Silicon.
        platform:
          - { name: linux/amd64,   tag: linux-amd64,   runner: ubuntu-latest }
          - { name: linux/arm64,   tag: linux-arm64,   runner: ubuntu-24.04-arm }
          - { name: darwin/arm64,  tag: darwin-arm64,  runner: macos-15 }
          - { name: windows/amd64, tag: windows-amd64, runner: windows-latest }
        module: [qodana-cli, qodana-clang, qodana-cdnet]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
      - uses: gradle/actions/setup-gradle@v4
      - name: Native compile
        run: ./gradlew :${{ matrix.module }}:nativeCompile -Pquick=true
        shell: bash
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-${{ matrix.platform.tag }}
          path: |
            ${{ matrix.module }}/build/native/nativeCompile/${{ matrix.module }}
            ${{ matrix.module }}/build/native/nativeCompile/${{ matrix.module }}.exe
          if-no-files-found: error
          retention-days: 14

  # End-to-end smoke for the qodana-cli native binary on every supported
  # platform.  Exercises the actual runtime commands (scan, pull, view, send,
  # show) against a real Docker daemon and a local mock cloud — see
  # qodana-cli/src/test/kotlin/org/jetbrains/qodana/cli/NativeBinarySendSmokeTest.kt
  # and qodana-cli/src/test/kotlin/org/jetbrains/qodana/cli/SarifCompareIntegrationTest.kt
  # for the harnesses this job invokes.
  #
  # Docker setup is OS-dependent:
  #   - Linux: native engine, ready out of the box.
  #   - Windows: hosted Windows runners can't run Linux containers
  #     (community/discussions/25491); Docker steps are gated off.
  #   - macOS arm64: hosted runners lack nested virt (QD-14821); Docker
  #     steps are gated off there too.
  #   - macOS Intel: dropped entirely (QD-14862). IntelliJ DirectoryLock
  #     socket can't bind on Lima+QEMU+overlayfs — JetBrains IJPL-161337.
  #
  # Readiness loops use a portable epoch-bounded `until` rather than GNU
  # `timeout`, which isn't on macOS by default.
  native-e2e:
    name: "E2E qodana-cli (${{ matrix.platform.tag }})"
    needs: native-build
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { tag: linux-amd64,            artifact: qodana-cli-linux-amd64,   runner: ubuntu-latest,    setup: linux,   docker: true  }
          - { tag: linux-arm64,            artifact: qodana-cli-linux-arm64,   runner: ubuntu-24.04-arm, setup: linux,   docker: true  }
          # `macos-15` is GitHub's hosted Apple-Silicon (M1) arm64 runner,
          # itself a guest VM. Docker on macOS needs a Linux VM (colima /
          # Docker Desktop), which in turn needs nested virtualisation
          # support from the host hypervisor. M1 Macs have no nested-virt
          # support at all, and the M3+ hardware capability isn't exposed
          # by GitHub's hypervisor yet — see
          # https://github.com/actions/runner-images/issues/9460 and the
          # colima abiosoft/colima#1427 thread. The sibling Go CLI repo
          # confirms the same: it gates `container-engine: none` for this
          # runner. Until GitHub exposes nested-virt on macos-15 arm64
          # (or we provision self-hosted M3+ runners), Docker-dependent
          # E2E steps are gated off here. The non-Docker checks
          # (--version, --help, view, send via NativeBinarySendSmokeTest)
          # still run so we keep binary-level coverage on Apple Silicon.
          # Tracked in QD-14821 alongside any self-hosted-runner provisioning.
          - { tag: darwin-arm64,           artifact: qodana-cli-darwin-arm64,  runner: macos-15,         setup: macos,   docker: false }
          # `windows-latest` runs the Docker engine in Windows-containers mode
          # and does NOT support Linux containers — GitHub's hosted Windows
          # runners are nested VMs and the hypervisor blocks WSL2 / Hyper-V
          # nested virtualisation that Docker Desktop would need (see
          # https://github.com/orgs/community/discussions/25491). The linter
          # image is linux/amd64, so Docker-dependent steps on this entry
          # would always fail with "no matching manifest for windows". We
          # gate them off (docker: false) — non-Docker commands still run
          # to verify the binary itself executes on Windows.
          - { tag: windows-amd64,          artifact: qodana-cli-windows-amd64, runner: windows-latest,   setup: windows, docker: false }
          # NOTE: `windows-amd64-on-arm` (running the amd64 binary on a
          # `windows-11-arm` runner) is NOT in this matrix. The shipped
          # binary is built without `-march=compatibility`, so it requires
          # native x86_64 features (CX8, MMX, SSE*, POPCNT, LZCNT, AVX*,
          # BMI*, FMA) that the runner's Prism x86 emulation layer doesn't
          # expose — the binary immediately exits with
          # "The current machine does not support all of the following CPU
          # features... Please rebuild the executable with an appropriate
          # setting of the -march option." Re-enabling this coverage
          # requires a separate "compatibility-mode" binary build (tracked
          # in QD-14819). Re-add the entry there. See CONTRIBUTING.md for
          # the user-facing limitation.
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # The send-smoke step invokes `./gradlew :qodana-cli:test` to host the
      # MockQDCloudHttpClient + S3 stub; that needs a JDK on PATH. Linux
      # runners come pre-provisioned; on macOS / Windows we install it.
      - name: Setup Java (macOS + Windows)
        if: matrix.platform.setup == 'macos' || matrix.platform.setup == 'windows'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Docker (linux)
        if: matrix.platform.docker && matrix.platform.setup == 'linux'
        shell: bash
        run: |
          deadline=$(( $(date +%s) + 60 ))
          until docker info >/dev/null 2>&1; do
            sleep 1
            [ "$(date +%s)" -lt "$deadline" ] || {
              echo "::error::Docker did not become available within 60s"
              exit 1
            }
          done
          echo "Docker is ready."
          docker version
          # The native binary picks the container user from $UID/$GID
          # (ContainerImageUtils.getDefaultUser); the shell never exports
          # those, so without this the container runs as root and writes
          # root-owned files into the bind-mounted report/cache/results
          # dirs that the host runner user can no longer clean up. See
          # the report-native deleteRecursively failure in PR #12 CI.
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Docker (Windows, Linux engine)
        if: matrix.platform.docker && matrix.platform.setup == 'windows'
        shell: pwsh
        run: |
          $cliPath = "C:\Program Files\Docker\Docker\DockerCli.exe"
          if (Test-Path $cliPath) {
            & $cliPath -SwitchLinuxEngine
          } else {
            Write-Host "DockerCli.exe not found at $cliPath; assuming Linux containers already active."
          }
          $deadlineSeconds = 180
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          while ($sw.Elapsed.TotalSeconds -lt $deadlineSeconds) {
            docker info > $null 2>&1
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 2
          }
          docker info > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Docker not ready in ${deadlineSeconds}s"
            exit 1
          }
          # docker-java needs an explicit DOCKER_HOST on Windows.
          "DOCKER_HOST=npipe:////./pipe/docker_engine" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          docker version

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: ./bin

      - name: chmod (POSIX)
        if: matrix.platform.setup != 'windows'
        shell: bash
        run: chmod +x ./bin/qodana-cli

      - name: Resolve binary path
        id: bin
        shell: bash
        run: |
          if [ -f ./bin/qodana-cli.exe ]; then
            echo "path=$PWD/bin/qodana-cli.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=$PWD/bin/qodana-cli" >> "$GITHUB_OUTPUT"
          fi

      - name: Read linter tag
        id: tag
        shell: bash
        run: |
          tag=$(grep '^qodana-jvm-community-tag' gradle/libs.versions.toml | awk -F'"' '{print $2}')
          test -n "$tag" || { echo "::error::failed to read linter tag from libs.versions.toml"; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Pre-pull linter image
        if: matrix.platform.docker
        shell: bash
        run: docker pull jetbrains/qodana-jvm-community:${{ steps.tag.outputs.tag }}

      - name: Stage fixture
        shell: bash
        run: |
          # Linux/Windows runners have $GITHUB_WORKSPACE writable end-to-end,
          # so stage the fixture directly there. macOS Intel was dropped
          # (QD-14862) due to upstream Lima/IntelliJ DirectoryLock issues
          # (IJPL-161337). macOS arm64 is gated to docker:false (QD-14821).
          WORK="$PWD"
          # The linter container writes cache/report as root inside its own
          # ~/.cache/JetBrains/Qodana/<id>/...; passing explicit --cache-dir
          # and --report-dir under $WORK keeps everything in a path we can
          # delete without sudo afterward. The rm below handles residue from
          # any previous run on the same runner.
          sudo rm -rf "$WORK/project" "$WORK/results-native" "$WORK/results-jvm" "$WORK/cache-native" "$WORK/cache-jvm" "$WORK/report-native" "$WORK/report-jvm" || rm -rf "$WORK/project" "$WORK/results-native" "$WORK/results-jvm" "$WORK/cache-native" "$WORK/cache-jvm" "$WORK/report-native" "$WORK/report-jvm"
          cp -r qodana-cli/src/test/resources/scan-smoke-fixture "$WORK/project"
          mkdir -p "$WORK/results-native" "$WORK/results-jvm" "$WORK/cache-native" "$WORK/cache-jvm" "$WORK/report-native" "$WORK/report-jvm"
          echo "QODANA_E2E_WORK=$WORK" >> "$GITHUB_ENV"

      # Non-Docker sanity checks run on every platform, including the
      # Docker-less windows-amd64-on-arm runner. They validate that the
      # binary itself executes and Clikt's reflection metadata is correct.
      - name: --version
        shell: bash
        run: ${{ steps.bin.outputs.path }} --version

      - name: --help
        shell: bash
        run: ${{ steps.bin.outputs.path }} --help

      - name: init --help
        shell: bash
        run: ${{ steps.bin.outputs.path }} init --help

      - name: scan (native)
        if: matrix.platform.docker
        shell: bash
        run: |
          ${{ steps.bin.outputs.path }} scan \
            -i "$QODANA_E2E_WORK/project" \
            -o "$QODANA_E2E_WORK/results-native" \
            --cache-dir "$QODANA_E2E_WORK/cache-native" \
            --report-dir "$QODANA_E2E_WORK/report-native" \
            --repository-root "$QODANA_E2E_WORK/project"

      - name: Assert SARIF (native)
        if: matrix.platform.docker
        shell: bash
        run: |
          test -s "$QODANA_E2E_WORK/results-native/qodana.sarif.json"
          grep -q '"results"' "$QODANA_E2E_WORK/results-native/qodana.sarif.json"
          # The fixture's StringEquality target fires for the JVM-community
          # linter; if the rule renames, the failure here points right at it.
          grep -q 'StringEquality' "$QODANA_E2E_WORK/results-native/qodana.sarif.json"

      - name: scan (JVM, for SARIF parity)
        if: matrix.platform.docker
        shell: bash
        run: |
          ./gradlew :qodana-cli:run --args="scan -i $QODANA_E2E_WORK/project -o $QODANA_E2E_WORK/results-jvm --repository-root $QODANA_E2E_WORK/project"

      - name: Assert structural SARIF equivalence (JVM vs native)
        if: matrix.platform.docker
        shell: bash
        run: |
          ./gradlew :qodana-cli:nativeBinaryTest --tests 'org.jetbrains.qodana.cli.SarifCompareIntegrationTest' \
            -Dtest.sarif.jvm="$QODANA_E2E_WORK/results-jvm/qodana.sarif.json" \
            -Dtest.sarif.native="$QODANA_E2E_WORK/results-native/qodana.sarif.json" \
            -Dtest.project.dir="$QODANA_E2E_WORK/project"

      - name: pull (force re-pull so streaming Frame DTO fires)
        if: matrix.platform.docker
        shell: bash
        run: |
          docker image rm alpine:3.20 || true
          ${{ steps.bin.outputs.path }} pull --image alpine:3.20

      # On Docker-less platforms, write a minimal SARIF stub for view/show to
      # consume so we still exercise their code paths.
      - name: Stub SARIF (no-Docker platforms)
        if: ${{ !matrix.platform.docker }}
        shell: bash
        run: |
          printf '%s' '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"test"}},"results":[]}]}' > "$QODANA_E2E_WORK/results-native/qodana.sarif.json"

      - name: view
        shell: bash
        run: ${{ steps.bin.outputs.path }} view -f "$QODANA_E2E_WORK/results-native/qodana.sarif.json"

      - name: send (via NativeBinarySendSmokeTest harness)
        shell: bash
        # The harness runs on the JVM (hosts the in-process cloud + S3 stubs)
        # and forks the native binary as a subprocess against them. No Docker
        # required — runs on every platform including windows-amd64-on-arm.
        run: |
          ./gradlew :qodana-cli:nativeBinaryTest --tests 'org.jetbrains.qodana.cli.NativeBinarySendSmokeTest' \
            -Dtest.qodana.binary="${{ steps.bin.outputs.path }}" \
            -Dtest.project.dir="$QODANA_E2E_WORK/project" \
            -Dtest.results.dir="$QODANA_E2E_WORK/results-native"

      - name: show --dir-only
        shell: bash
        run: ${{ steps.bin.outputs.path }} show -i "$QODANA_E2E_WORK/project" -o "$QODANA_E2E_WORK/results-native" --dir-only
