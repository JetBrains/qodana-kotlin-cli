name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run prek (commit-stage hooks)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-commit
      - name: Run prek (push-stage hooks — Gradle lint)
        uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-push

  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      # Requires the QODANA_TOKEN secret on the repo (project token from
      # https://qodana.cloud). Without it the linter fails fast with
      # "Starting from 2023.2 release versions require connection to Qodana Cloud."
      - uses: JetBrains/qodana-action@v2026.1.0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          post-pr-comment: true
          use-annotations: true
          upload-result: true

  native-build:
    name: "Build ${{ matrix.module }} (${{ matrix.platform.name }})"
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux/amd64,   tag: linux-amd64,   runner: ubuntu-latest }
          - { name: linux/arm64,   tag: linux-arm64,   runner: ubuntu-24.04-arm }
          - { name: darwin/amd64,  tag: darwin-amd64,  runner: macos-15-intel }
          - { name: darwin/arm64,  tag: darwin-arm64,  runner: macos-15 }
          - { name: windows/amd64, tag: windows-amd64, runner: windows-latest }
        module: [qodana-cli, qodana-clang, qodana-cdnet]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-native-build
        with:
          native-image-job-reports: 'true'
      - name: Native compile (+ DLL bundle + deps test on Windows)
        # On Windows, chain nativeCompile → bundleWindowsCrt → NativeWindowsDepsTest in one Gradle
        # invocation so the task graph guarantees the .exe and the bundled VC++ DLLs exist before
        # the test reads them (QD-14812). `-PnativeTests=true` opts in to the `native-deps` JUnit
        # tag (otherwise excluded by build-logic/testing.gradle.kts).
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./gradlew :${{ matrix.module }}:nativeCompile \
                      :${{ matrix.module }}:bundleWindowsCrt \
                      :${{ matrix.module }}:test \
                      --tests "*NativeWindowsDepsTest" \
                      -Pquick=true -PnativeTests=true
          else
            ./gradlew :${{ matrix.module }}:nativeCompile -Pquick=true
          fi
      - name: Smoke-run produced binary (Windows)
        # Catches "binary links but crashes at startup" that NativeWindowsDepsTest's import-table
        # check cannot detect. Uses --help (vs --version) because clang/cdnet don't implement
        # versionOption. Runs on the GHA runner which has the VC++ Redistributable pre-installed,
        # so this is NOT a clean-Windows-install validation — that's tracked as a follow-up. It
        # only verifies the binary starts and the bundled DLLs load alongside the .exe.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "${{ matrix.module }}/build/native/nativeCompile/${{ matrix.module }}.exe"
          $output = & $exe --help 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
            Write-Error "::error::$exe --help exited with $LASTEXITCODE`n$output"
            exit $LASTEXITCODE
          }
          if ([string]::IsNullOrWhiteSpace($output)) {
            Write-Error "::error::$exe --help produced no output (binary might link cleanly but crash silently)"
            exit 1
          }
      - name: Upload binary
        # Run even when the preceding step failed — the binary is still useful for debugging.
        # Cancellation still skips, so this isn't `always()`.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-${{ matrix.platform.tag }}
          path: |
            ${{ matrix.module }}/build/native/nativeCompile/${{ matrix.module }}
            ${{ matrix.module }}/build/native/nativeCompile/${{ matrix.module }}.exe
            ${{ matrix.module }}/build/native/nativeCompile/*.dll
          if-no-files-found: error
          retention-days: 14
