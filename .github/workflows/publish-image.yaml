name: Publish Image

# Reusable: build one linter image per arch on its native runner (via build-linter-image), push each child
# UNTAGGED by digest (push-by-digest), then assemble the multi-arch manifest from those digests with
# `imagetools create` and apply the caller-computed `tags`. No staging tags exist — the children are
# referenced only by the index, so retention deletes the index by digest and the registry GCs the orphaned
# children (Space rejects tag deletes, and a staging tag would share the child's digest → un-deletable
# without breaking the index). Callers pass a NORMALIZED version (the resolved runtime, e.g. "20" for the
# cpp default) and the fully-resolved `tags` (space-separated bare names; merge prepends the registry) so
# the concurrency group and the applied tags key on one identity. Callers: publish-image-dispatch
# (snapshot) and nightly.yaml's publish-images stage (nightly).

on:
  workflow_call:
    inputs:
      image: { required: true, type: string }
      version: { required: false, type: string, default: '' }
      tags: { required: true, type: string }   # space-separated BARE tag names; merge prepends $REGISTRY/<image>:
      ref: { required: true, type: string }
      token-gated: { required: true, type: string }
      feed-required: { required: true, type: string }
      compose-files: { required: true, type: string }

permissions:
  contents: read

# Serialize publishes that write the same tags (the authoritative publish identity), so two runs can't
# race the shared moving tag.
concurrency:
  group: publish-${{ inputs.image }}-${{ inputs.tags }}
  cancel-in-progress: false

env:
  REGISTRY: registry.jetbrains.team/p/sa/qodana-kcli-images

jobs:
  build:
    name: Build ${{ inputs.image }} (linux/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - name: Log in to the target registry
        # Before the build: build-linter-image (publish mode) bakes push-by-digest straight to this registry.
        uses: docker/login-action@v4
        with:
          registry: registry.jetbrains.team
          username: ${{ secrets.DOCKER_WRITE_KCLI_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_WRITE_KCLI_REGISTRY_TOKEN }}
      - name: Build and push ${{ inputs.image }} by digest
        id: build
        uses: ./.github/actions/build-linter-image
        with:
          image: ${{ inputs.image }}
          version: ${{ inputs.version }}
          arch: ${{ matrix.arch }}
          token-gated: ${{ inputs.token-gated }}
          feed-required: ${{ inputs.feed-required }}
          compose-files: ${{ inputs.compose-files }}
          docker-registry-user: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          docker-registry-token: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
          space-packages-token: ${{ secrets.QODANA_READ_SPACE_PACKAGES_TOKEN }}
          push-registry: ${{ env.REGISTRY }}
      - name: Record the per-arch digest
        # The child is pushed UNTAGGED (push-by-digest); only the merge job tags the final index. bake's
        # `--set platform` makes the child's arch authoritative; the merge job's both-arches inspect
        # catches any arch mix-up.
        shell: bash
        run: |
          set -euo pipefail
          digest='${{ steps.build.outputs.digest }}'
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::no digest from build: '$digest'"; exit 1; }
          mkdir -p digests
          printf '%s' "$digest" > "digests/${{ matrix.arch }}"
      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ inputs.image }}-${{ inputs.version || 'default' }}-${{ matrix.arch }}
          path: digests/${{ matrix.arch }}
          if-no-files-found: error

  merge:
    name: Merge ${{ inputs.image }} manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7        # only for the local ./.github/actions/retry
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/download-artifact@v5
        with:
          pattern: digest-${{ inputs.image }}-${{ inputs.version || 'default' }}-*
          path: digests
          merge-multiple: true
      - name: Log in to the target registry
        uses: docker/login-action@v4
        with:
          registry: registry.jetbrains.team
          username: ${{ secrets.DOCKER_WRITE_KCLI_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_WRITE_KCLI_REGISTRY_TOKEN }}
      - name: Assemble the multi-arch manifest and apply the tags
        uses: ./.github/actions/retry
        with:
          what: imagetools create (registry)
          run: |
            set -euo pipefail
            amd64="$(cat digests/amd64)"; arm64="$(cat digests/arm64)"
            for d in "$amd64" "$arm64"; do
              [[ "$d" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::missing/invalid per-arch digest: '$d'"; exit 1; }
            done
            read -ra NAMES <<< '${{ inputs.tags }}'
            [ "${#NAMES[@]}" -ge 1 ] || { echo "::error::no tags passed"; exit 1; }
            tflags=(); for t in "${NAMES[@]}"; do tflags+=(--tag "$REGISTRY/${{ inputs.image }}:$t"); done
            err="$(mktemp)"
            if docker buildx imagetools create "${tflags[@]}" \
              "$REGISTRY/${{ inputs.image }}@$amd64" "$REGISTRY/${{ inputs.image }}@$arm64" 2>"$err"; then
              cat "$err" >&2; exit 0
            else
              rc=$?   # capture the REAL failing exit code; `$?` after a bare `fi` would reset to 0
            fi
            cat "$err" >&2
            grep -qE 'received unexpected HTTP status: (429|5[0-9][0-9])|TLS handshake timeout|connection refused|i/o timeout|EOF' "$err" && exit 75
            exit "$rc"
      - name: Assert the published manifest resolves both arches
        uses: ./.github/actions/retry
        with:
          what: imagetools inspect (registry)
          run: |
            set -euo pipefail
            read -ra NAMES <<< '${{ inputs.tags }}'
            first="$REGISTRY/${{ inputs.image }}:${NAMES[0]}"
            err="$(mktemp)"
            if inspect="$(docker buildx imagetools inspect "$first" 2>"$err")"; then
              cat "$err" >&2
              echo "$inspect" | grep -q 'linux/amd64' || { echo "::error::published manifest missing linux/amd64"; exit 1; }
              echo "$inspect" | grep -q 'linux/arm64' || { echo "::error::published manifest missing linux/arm64"; exit 1; }
              { echo "### Published ${{ inputs.image }}"; for t in "${NAMES[@]}"; do echo "- \`$REGISTRY/${{ inputs.image }}:$t\`"; done; } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            else
              rc=$?   # capture the REAL failing exit code; `$?` after a bare `fi` would reset to 0
            fi
            cat "$err" >&2
            grep -qE 'received unexpected HTTP status: (429|5[0-9][0-9])|TLS handshake timeout|connection refused|i/o timeout|EOF' "$err" && exit 75
            exit "$rc"
