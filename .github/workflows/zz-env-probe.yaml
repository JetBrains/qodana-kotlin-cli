name: zz env probe

# THROWAWAY probe (do not merge). Answers one contested question: does an APPROVED fork
# `pull_request` run receive an environment secret? Uses a dummy secret (PROBE_SECRET=canary)
# and prints only its presence/length, never its value.

on:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    # The exact fork-only conditional the real design would use:
    # fork PR -> 'jetbrains-internal' (job pends for maintainer approval); same-repo/push/dispatch -> '' (no gate).
    environment: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'jetbrains-internal' || '' }}
    env:
      PROBE: ${{ secrets.PROBE_SECRET }}
    steps:
      - name: Diagnostics (non-secret)
        run: |
          echo "event_name = ${{ github.event_name }}"
          echo "head.repo  = ${{ github.event.pull_request.head.repo.full_name }}"
          echo "base.repo  = ${{ github.repository }}"
      - name: Secret presence (value never printed)
        run: |
          if [ -n "$PROBE" ]; then
            echo "RESULT: PRESENT (len=${#PROBE})"
          else
            echo "RESULT: EMPTY"
          fi
