name: Linter image drift

# Scheduled drift bot for the in-repo Qodana linter image pins:
#   canary — re-resolve each pinned IDE dist and RE-VERIFY GPG+sha256 fail-closed (image-tool
#            verify-pin). A 404 / sha256 mismatch / signer mismatch opens a tracking issue and fails.
#   bump   — pick the newest within-major build per linter and open a PR rewriting the pins
#            (image-tool bump-pins; it also syncs phase-0-decisions.md so EnvContractTest stays green).
# Cron avoids :00 per scheduling guidance.

on:
  schedule:
    - cron: '17 4 * * *' # 04:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: linter-image-drift
  cancel-in-progress: false

jobs:
  canary:
    name: Pin canary
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - name: Ensure gnupg is present
        # DistVerifier shells out to gpg/sha256sum/curl; don't assume gpg is preinstalled on the runner.
        run: |
          set -euo pipefail
          command -v gpg >/dev/null || { sudo apt-get update && sudo apt-get install -y --no-install-recommends gnupg; }
          gpg --version | head -1
      - run: ./gradlew :linter-images:installDist
      - name: Re-verify pinned dists
        run: |
          set -euo pipefail
          TOOL=linter-images/build/install/image-tool/bin/image-tool
          FPR="$(cat linter-images/docker/lib/jetbrains.pub.fpr)"
          KEY=linter-images/docker/lib/jetbrains.pub
          FAILED=0
          # Read each key per-file with grep (NOT `source`, which would leak a prior file's value into a
          # file that omits the key). jvm and android share the qodana-jvm pin → dedup the verify work.
          declare -A SEEN
          val() { grep -E "^$1=" "$2" | head -1 | cut -d= -f2- || true; }
          for env in linter-images/docker/images/*.env; do
            SLUG="$(val QD_LINTER_SLUG "$env")"
            # clang has no IDE dist (no QD_LINTER_SLUG) → skip the IDE-dist canary for it.
            [ -n "$SLUG" ] || { echo "skip $(basename "$env"): no IDE dist"; continue; }
            VERSION="$(val QD_VERSION "$env")"
            BUILD="$(val QD_BUILD "$env")"
            CHANNEL="$(val QD_CHANNEL "$env")"; CHANNEL="${CHANNEL:-public}"
            KEYID="${SLUG}:${VERSION}:${BUILD}:${CHANNEL}"
            [ -z "${SEEN[$KEYID]:-}" ] || { echo "skip $KEYID: already verified"; continue; }
            SEEN[$KEYID]=1
            echo "::group::verify-pin $KEYID"
            "$TOOL" verify-pin \
              --linter-slug "$SLUG" \
              --version "$VERSION" \
              --build "$BUILD" \
              --channel "$CHANNEL" \
              --gpg-key "$KEY" \
              --gpg-fingerprint "$FPR" \
              || FAILED=1
            echo "::endgroup::"
          done
          echo "FAILED=$FAILED" >> "$GITHUB_ENV"
      - name: Open an issue if the pin is broken
        if: ${{ env.FAILED == '1' }}
        run: |
          set -euo pipefail
          LABEL=linter-image-pin
          TITLE="Linter image: pinned dist failed re-verification"
          # Create the label idempotently — `gh issue create --label` errors if the label is absent.
          gh label create "$LABEL" --description "Linter image dist pin re-verification failures" --color B60205 2>/dev/null || true
          if gh issue list --label "$LABEL" --state open --json title --jq '.[].title' | grep -qxF "$TITLE"; then
            echo "issue already open"
          else
            gh issue create --label "$LABEL" \
              --title "$TITLE" \
              --body "The scheduled canary could not re-verify a currently-pinned dist (404, sha256 mismatch, or GPG signer mismatch). Inspect the canary job logs and re-pin via the drift bump."
          fi
      - name: Fail the job if the pin is broken
        if: ${{ env.FAILED == '1' }}
        run: exit 1

  bump:
    name: Bump pins
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :linter-images:installDist
      - name: Resolve newer within-major builds and rewrite pins
        # bump-pins reads each IDE-dist .env, picks the newest within-major release of the pinned
        # QD_RELEASE_TYPE, and rewrites QD_BUILD in place; it also syncs the QODANA_<SLUG>_BUILD row in
        # phase-0-decisions.md so EnvContractTest stays green on the resulting PR.
        run: |
          linter-images/build/install/image-tool/bin/image-tool bump-pins \
            --images-dir linter-images/docker/images \
            --decisions-file linter-images/docs/phase-0-decisions.md
      - name: Open a bump PR if anything changed
        run: |
          set -euo pipefail
          if git diff --quiet; then echo "no drift"; exit 0; fi
          # Unique branch per run so a same-day re-dispatch never collides with an existing branch.
          BRANCH="linter-image-drift/$(date -u +%Y%m%d)-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -am "chore(linter-images): bump within-major dist pins"
          git push -u origin "$BRANCH"
          # NOTE: a PR opened with GITHUB_TOKEN does NOT itself trigger the `Linter images` workflow
          # (GitHub suppresses recursive workflow runs). A human must re-run / push to that PR to
          # exercise the image build + dogfood check before merging.
          gh pr create --fill --base main --head "$BRANCH" \
            --title "chore(linter-images): within-major dist pin bump" \
            --body "Automated within-major bump of the linter dist pins. Re-run the **Linter images** workflow on this PR (it is not auto-triggered for bot-authored PRs) before merging."
