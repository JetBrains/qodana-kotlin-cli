name: Images

# Additive CI for the in-repo Qodana linter images. Separate from the `Checks` workflow's `Qodana`
# check — this builds each IMAGE from this tree (CLI_SOURCE=context) and runs the in-tree e2e fixtures
# against it the way a real customer would (the @Tag("linter-e2e") harness). CI-only: the docker-driving
# suite can't run on the arm64 dev box. The arch-capable images (the `ArchContract.archCapable` set) also
# run arm64 e2e on `ubuntu-24.04-arm` runners (QD-15171); the rest stay amd64-only. The full matrix runs
# on every PR (pull_request is unfiltered so the required Images gate never stalls — QD-15343); only the
# push trigger stays path-filtered to the image build system.

on:
  # No paths filter on pull_request: the required `Images` gate aggregates the e2e matrix (Default Branch
  # ruleset), so a paths-filtered PR that never triggers e2e would strand the gate in "Expected" merge
  # limbo. Run the full matrix on every PR; cheap change-gating is deferred (QD-15343).
  pull_request:
  push:
    branches: [main]
    paths:
      - linter-images/**
      - .github/workflows/images.yaml
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # resolve + hadolint runs as a prek hook (.pre-commit-config.yaml), locally and in CI's prek step —
  # not as a job here. The image-tool unit tests (incl. the pure e2e-harness tests: manifest/planner/
  # evaluator) run in the stock `Test` job (./gradlew test). Only the @Tag("linter-e2e") docker runs
  # live here, behind a per-image build.

  e2e:
    # One job per image. Each cell builds ITS image from this tree, then runs the harness scoped to
    # that image (-Dlinter.e2e.image), so a build/scan/assert failure surfaces in — and only in — the
    # relevant image's job. fail-fast:false keeps the three signals independent.
    name: E2E ${{ matrix.image.name }}${{ matrix.image.version != '' && format('-{0}', matrix.image.version) || '' }} (linux/${{ matrix.image.arch }})
    runs-on: ${{ matrix.image.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        image:
          # compose_files: the exact `-f` flags for `docker compose` (repo-root-relative).
          # token_gated: clang's clang-tidy comes from the PRIVATE mirror, so both its build and its
          # e2e require QODANA_READ_SPACE_PACKAGES_TOKEN; an empty secret (e.g. a fork PR) fails RED, never no-ops.
          # requires_license: this image's e2e fixture passes QODANA_LICENSE_ONLY_TOKEN via passEnv (a
          # paid IDE-dist linter). The scan step runs on every paid cell and fails loud on a missing token (the
          # harness errors on a blank passEnv). Flip to "true" in the commit that
          # adds the image's passEnv fixture.
          - name: qodana-jvm
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
            requires_license: "true"
            feed_required: "true"
            arch: amd64
            runner: ubuntu-latest
          - name: qodana-jvm
            compose_files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.private.yaml
            token_gated: "false"
