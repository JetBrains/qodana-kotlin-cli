    steps:
      # No `ref:` override → checkout defaults to github.ref = the PR merge commit on pull_request.
      - uses: actions/checkout@v7
      - name: Build ${{ matrix.image.name }}
        uses: ./.github/actions/build-linter-image
        with:
          image: ${{ matrix.image.name }}
          version: ${{ matrix.image.version }}
          arch: ${{ matrix.image.arch }}
          token-gated: ${{ matrix.image.token_gated }}
          feed-required: ${{ matrix.image.feed_required }}
          compose-files: ${{ matrix.image.compose_files }}
          docker-registry-user: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          docker-registry-token: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
          space-packages-token: ${{ secrets.QODANA_READ_SPACE_PACKAGES_TOKEN }}
      - name: e2e ${{ matrix.image.name }} (free)
        if: ${{ matrix.image.token_gated != 'true' && matrix.image.requires_license != 'true' }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: e2e ${{ matrix.image.name }} (licensed)
        # Paid IDE-dist linters license over the bridge network in license-only mode. The token forwards
        # via the fixture passEnv; the harness errors on a blank one, so a missing token fails loud.
        if: ${{ matrix.image.token_gated != 'true' && matrix.image.requires_license == 'true' }}
        env:
          QODANA_LICENSE_ONLY_TOKEN: ${{ secrets.QODANA_LICENSE_ONLY_TOKEN }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: e2e ${{ matrix.image.name }} (token-gated)
        # clang/cdnet are self-contained after build (clang-tidy/CLT baked in): the scan needs no token.
        if: ${{ matrix.image.token_gated == 'true' }}
        run: ./gradlew :linter-images:linterE2eTest -Dlinter.e2e.image=${{ matrix.image.name }}
      - name: Upload e2e artifacts (idea.log + sarif)
        # Always upload whatever the harness archived (idea.log + SARIF per case) so a failing scan's real
        # cause is downloadable. if-no-files-found:ignore covers skipped cells.
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ matrix.image.name }}-${{ matrix.image.version || 'default' }}-${{ matrix.image.arch }}
          path: linter-images/build/linter-e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 14

  release-smoke:
    # qodana-jvm is an arbitrary canary for the release profile (any image would do). End-to-end proof the
    # release overlay flips a dist: qodana-jvm defaults to the internal nightly feed, so compose.release.yaml
    # must flip it back to the public dist.
    # CLI_SOURCE=context (compose.ci.yaml) builds the from-tree CLI — no nightly-tag asset download. The job
    # carries NO Space token, so a silently-unapplied overlay falls back to the internal sha256 feed and
    # fails RED. All steps run unconditionally: a missing registry credential reds the job at the docker
    # login (docker/login-action errors on empty creds). NOT a required check.
    name: Release profile smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Build qodana-jvm via the release profile (public feed, GPG, no token)
        uses: ./.github/actions/build-linter-image
        with:
          image: qodana-jvm
          arch: amd64
          feed-required: 'false'
          compose-files: -f linter-images/compose.yaml -f linter-images/compose.ci.yaml -f linter-images/compose.release.yaml
          docker-registry-user: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_USER }}
          docker-registry-token: ${{ secrets.DOCKER_READ_PUBLIC_REGISTRY_TOKEN }}
          # space-packages-token intentionally omitted (empty): the release overlay must build token-free.

  images:
    # Stable required check for the whole image matrix — the ruleset requires `Images`, not the ~30
    # cell names, so cells rename/grow without touching governance. Fails if any needed cell fails.
    # No `allowed-skips`/`allowed-failures`: strict handling means a skipped or failed e2e cell fails the
    # gate, never silently greens it.
    name: Images
    needs: [e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
