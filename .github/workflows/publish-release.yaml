name: Publish Release

# Flips an existing DRAFT release to published, materializing the git tag at the SHA that was pinned
# at draft-creation time. Publish canonicalizes the version the same way draft did (via
# `normalize-version.main.kts`, so the tag matches the draft's) but performs no other validation — the
# draft was validated when created (asset set + filename allowlist + targetCommitish), and the operator
# inspected the draft on the GitHub release page before dispatching this workflow. This is still the
# "CEO pushes the red button" stage (per QD-14721's bindreams/hole-style design): fast and unconditional.
#
# Triggers:
#   - workflow_dispatch (operator-driven, after inspecting the draft)
#   - workflow_call (nightly.yaml umbrella)

on:
  workflow_dispatch:
    inputs: &inputs
      version:
        description: 'Version (e.g. 2026.3.1 for tagged, or 2026.3.1-nightly.20260603 for nightly)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false
      latest:
        description: 'Mark this release as `latest`'
        required: false
        type: boolean
        default: true
      mode:
        description: '`tagged` or `nightly` — chooses concurrency group'
        required: false
        type: string
        default: 'tagged'
  workflow_call:
    inputs: *inputs

permissions:
  contents: write

concurrency:
  group: publish-${{ inputs.mode }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO: ${{ github.repository }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: ./.github/actions/setup-kotlin

      - name: Flip release to published
        shell: bash
        run: |
          set -euo pipefail
          TAG=$(kotlin release-tools/scripts/normalize-version.main.kts '${{ inputs.version }}')
          PRERELEASE_FLAG=()
          if [ '${{ inputs.prerelease }}' = 'true' ]; then PRERELEASE_FLAG=(--prerelease); fi
          gh release edit "$TAG" \
            --draft=false \
            --latest='${{ inputs.latest }}' \
            "${PRERELEASE_FLAG[@]}"
          echo "Published: https://github.com/${{ github.repository }}/releases/tag/$TAG"
