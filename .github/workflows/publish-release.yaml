name: Publish Release

# Flips an existing DRAFT release to published, materializing the git tag at the SHA that was pinned
# at draft-creation time. Verifies the draft exists, has the expected SHA, and carries the expected
# asset set BEFORE publishing — fail-closed if anything is off.
#
# Triggers:
#   - workflow_dispatch (operator-driven, after inspecting the draft)
#   - workflow_call (nightly.yaml umbrella)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2026.3.1 for tagged, or 2026.3.1-nightly for nightly)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false
      latest:
        description: 'Mark this release as `latest`'
        required: false
        type: boolean
        default: true
      expected-sha:
        description: 'Full 40-char SHA the draft must target (from the draft page)'
        required: true
        type: string
      cli-only:
        description: 'Expect cli-only asset set (true for nightlies)'
        required: false
        type: boolean
        default: false
      mode:
        description: '`tagged` or `nightly` — chooses concurrency group'
        required: false
        type: string
        default: 'tagged'
  workflow_call:
    inputs:
      version: { required: true, type: string }
      prerelease: { required: false, type: boolean, default: false }
      latest: { required: false, type: boolean, default: true }
      expected-sha: { required: true, type: string }
      cli-only: { required: false, type: boolean, default: false }
      mode: { required: false, type: string, default: 'tagged' }

permissions:
  contents: write

concurrency:
  group: publish-${{ inputs.mode }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO: ${{ github.repository }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.outputs.outputs.tag }}
    steps:
      - name: Validate version format
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'
          if [[ "$VERSION" == *-nightly ]]; then
            REGEX='^[0-9]+\.[0-9]+(\.[0-9]+)?-nightly$'
          else
            REGEX='^[0-9]+\.[0-9]+(\.[0-9]+)?$'
          fi
          if [[ ! "$VERSION" =~ $REGEX ]]; then
            echo "::error::Version '$VERSION' does not match the expected format"
            exit 1
          fi
      - name: Emit outputs
        id: outputs
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "tag=v${{ inputs.version }}"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify draft
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 (instead of 1) so `git rev-parse` can canonicalize a `targetCommitish`
          # even when it points to a commit that's no longer on `main`'s tip-1 path. Without full
          # history, a draft created against a stale commit would false-fail verification.
          fetch-depth: 0
          fetch-tags: true

      - name: Verify draft exists with expected SHA and asset set
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ needs.validate.outputs.tag }}'

          if ! gh release view "$TAG" --json isDraft,targetCommitish,assets > release.json 2>err.log; then
            echo "::error::Release $TAG not found"
            cat err.log
            exit 1
          fi

          IS_DRAFT=$(jq -r '.isDraft' release.json)
          if [ "$IS_DRAFT" != "true" ]; then
            echo "::error::Release $TAG is not a draft (isDraft=$IS_DRAFT)"
            exit 1
          fi

          # Resolve targetCommitish to a canonical 40-char SHA via git rev-parse (the API may return
          # a short SHA or branch ref in edge cases — verified comparison via canonical form).
          RAW_TARGET=$(jq -r '.targetCommitish' release.json)
          CANONICAL=$(git rev-parse "$RAW_TARGET" 2>/dev/null || echo "$RAW_TARGET")
          if [ "$CANONICAL" != '${{ inputs.expected-sha }}' ]; then
            echo "::error::Release $TAG targetCommitish ($CANONICAL) does not match expected SHA (${{ inputs.expected-sha }})"
            exit 1
          fi

          VERSION='${{ inputs.version }}'
          if [ '${{ inputs.cli-only }}' = 'true' ]; then
            EXPECTED_FILES=(
              qodana_linux_x86_64.tar.gz qodana_linux_arm64.tar.gz
              qodana_darwin_x86_64.tar.gz qodana_darwin_arm64.tar.gz
              qodana_windows_x86_64.zip
              qodana-cli-sbom.json
              checksums.txt
            )
          else
            EXPECTED_FILES=(
              qodana_linux_x86_64.tar.gz qodana_linux_arm64.tar.gz
              qodana_darwin_x86_64.tar.gz qodana_darwin_arm64.tar.gz
              qodana_windows_x86_64.zip
              "qodana-clang_${VERSION}_linux_amd64"   "qodana-clang_${VERSION}_linux_arm64"
              "qodana-clang_${VERSION}_darwin_amd64"  "qodana-clang_${VERSION}_darwin_arm64"
              "qodana-clang_${VERSION}_windows_amd64.exe"
              "qodana-cdnet_${VERSION}_linux_amd64"   "qodana-cdnet_${VERSION}_linux_arm64"
              "qodana-cdnet_${VERSION}_darwin_amd64"  "qodana-cdnet_${VERSION}_darwin_arm64"
              "qodana-cdnet_${VERSION}_windows_amd64.exe"
              qodana-cli-sbom.json qodana-clang-sbom.json qodana-cdnet-sbom.json
              checksums.txt
            )
          fi

          ACTUAL=$(jq -r '.assets[].name' release.json | sort)
          EXPECTED=$(printf '%s\n' "${EXPECTED_FILES[@]}" | sort)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Asset set mismatch on $TAG:"
            diff <(printf '%s\n' "$EXPECTED") <(printf '%s\n' "$ACTUAL") || true
            exit 1
          fi
          echo "Draft verified: $TAG, target=$CANONICAL, $(printf '%s\n' "${EXPECTED_FILES[@]}" | wc -l | tr -d ' ') assets"

          # TODO(QD-12637): once Phase C.1 lands, verify checksums.txt.asc presence + GPG signature here.

  publish:
    name: Publish
    needs: [validate, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Flip release to published
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ needs.validate.outputs.tag }}'
          PRERELEASE_FLAG=()
          if [ '${{ inputs.prerelease }}' = 'true' ]; then PRERELEASE_FLAG=(--prerelease); fi
          gh release edit "$TAG" \
            --draft=false \
            --latest='${{ inputs.latest }}' \
            "${PRERELEASE_FLAG[@]}"
          echo "Published: https://github.com/${{ github.repository }}/releases/tag/$TAG"
