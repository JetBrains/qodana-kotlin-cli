name: Nightly Release

# Chains Draft Release → Publish Release for an automated nightly. There is no human checkpoint
# between draft and publish for nightlies — the umbrella runs both in sequence. Nightlies build the
# full asset set (cli + clang + cdnet, cli-only: false) so the clang/cdnet linter images can pull
# their inner CLIs from the nightly release via `--source release` (QD-14960).
#
# Requires `gradle.properties` `version=` to be set to a numeric value (not `dev`);
# `compute-nightly-version.main.kts` exits non-zero while the source-of-truth is still `dev`. Operators
# must bump `gradle.properties` to a numeric version before this workflow can run successfully.

on:
  schedule:
    - cron: '7 3 * * *' # 03:07 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  compute:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      sha: ${{ steps.compute.outputs.sha }}
      # <date[.counter]> — the image nightly tag id, so `<mm>-nightly.<id>` matches the CLI nightly version.
      nightly-id: ${{ steps.compute.outputs.nightly-id }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: ./.github/actions/setup-kotlin

      - id: compute
        shell: bash
        run: |
          set -euo pipefail
          OUT=$(kotlin release-tools/scripts/compute-nightly-version.main.kts)
          BASE=$(printf '%s\n' "$OUT" | grep '^NIGHTLY_VERSION=' | head -n1 | cut -d= -f2)
          if [ -z "$BASE" ]; then
            echo "::error::compute-nightly-version did not emit NIGHTLY_VERSION="
            printf '%s\n' "$OUT"; exit 1
          fi
          VERSION="${BASE#v}"
          SHA=$(git rev-parse HEAD)
          NIGHTLY_ID="${VERSION#*-nightly.}"
          { echo "version=$VERSION"; echo "sha=$SHA"; echo "nightly-id=$NIGHTLY_ID"; } >> "$GITHUB_OUTPUT"
          echo "Computed: version=$VERSION sha=$SHA nightly-id=$NIGHTLY_ID"

  draft:
    name: Draft
    needs: compute
    uses: ./.github/workflows/draft-release.yaml
    permissions:
      contents: write
    with:
      version: ${{ needs.compute.outputs.version }}
      prerelease: true
      cli-only: false
      dry-run: false
      latest: false
      mode: nightly
      # Pin the SHA observed by compute so draft-release does not re-resolve HEAD in a new job
      # (which could drift if `main` advanced between jobs).
      target-sha: ${{ needs.compute.outputs.sha }}
    secrets: inherit

  publish:
    name: Publish
    needs: [compute, draft]
    uses: ./.github/workflows/publish-release.yaml
    permissions:
      contents: write
    with:
      version: ${{ needs.compute.outputs.version }}
      prerelease: true
      latest: false
      mode: nightly
    secrets: inherit

  publish-matrix:
    name: Compute publish matrix
    needs: compute
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.compute.outputs.sha }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - id: m
        # The full (image, version) set + per-cell gating, single-sourced (bound to images.yaml by a test).
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :linter-images:installDist
          matrix="$(linter-images/build/install/image-tool/bin/image-tool resolve-publish-matrix \
            --channel nightly --id '${{ needs.compute.outputs.nightly-id }}')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  publish-images:
    name: Publish ${{ matrix.image }}${{ matrix.version != '' && format('-{0}', matrix.version) || '' }}
    needs: [compute, publish-matrix]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.publish-matrix.outputs.matrix) }}
    uses: ./.github/workflows/publish-image.yaml
    with:
      image: ${{ matrix.image }}
      version: ${{ matrix.version }}
      tags: ${{ matrix.tags }}
      ref: ${{ needs.compute.outputs.sha }}
      token-gated: ${{ matrix.token_gated }}
      feed-required: ${{ matrix.feed_required }}
      compose-files: ${{ matrix.compose_files }}
    secrets: inherit

  retention:
    name: Registry retention
    needs: [publish-images]
    runs-on: ubuntu-latest
    env:
      REGISTRY: registry.jetbrains.team/p/sa/qodana-kcli-images
      DOCKER_WRITE_KCLI_REGISTRY_USER: ${{ secrets.DOCKER_WRITE_KCLI_REGISTRY_USER }}
      DOCKER_WRITE_KCLI_REGISTRY_TOKEN: ${{ secrets.DOCKER_WRITE_KCLI_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: ./.github/actions/setup-kotlin
      - name: Prune stale registry tags
        # Dry-run-first until the plan is reviewed against production.
        run: |
          set -euo pipefail
          ./gradlew :linter-images:installDist
          linter-images/build/install/image-tool/bin/image-tool prune-registry \
            --registry "$REGISTRY" --dry-run

  cleanup:
    name: Cleanup old nightly assets
    needs: [compute, draft, publish]
    if: ${{ always() && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: ./.github/actions/setup-kotlin
      - name: Strip assets from nightlies older than the newest 7
        shell: bash
        run: kotlin release-tools/scripts/cleanup-old-nightlies.main.kts --keep 7
