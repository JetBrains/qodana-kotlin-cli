name: Build a linter image
description: |
  Builds one Qodana linter image from this tree (CLI_SOURCE=context) for a single arch, ready for a
  caller to scan (e2e) or push (publish). Encapsulates the shared build core (disk reclaim, logins,
  token gates, build, runtime guard) used by both callers. On success the built `<image>:dev` is
  loaded locally and $GITHUB_ENV carries BUILD_ARGS / EXPECT_TOOL / EXPECT_VERSION.

  IMPORTANT: callers MUST run actions/checkout themselves before invoking this action — local
  composite actions are resolved from the workspace.

inputs:
  image:
    description: 'Linter image = compose service, e.g. qodana-jvm.'
    required: true
  version:
    description: 'Runtime version sub-axis (ruby/cpp/clang); empty = family default.'
    required: false
    default: ''
  arch:
    description: 'amd64 | arm64. Must match the runner arch (nativeCompile is host-arch).'
    required: true
  token-gated:
    description: 'true for clang/cdnet: the inner CLI is a raw Tool binary staged from build/release, and the build needs the private mirror token.'
    required: false
    default: 'false'
  feed-required:
    description: 'true for every internal-nightly-feed dist image (mounts the Space token via compose.private.yaml).'
    required: false
    default: 'false'
  compose-files:
    description: 'The exact -f flags for docker compose (repo-root-relative).'
    required: true
  docker-registry-user:
    description: 'docker.io / dhi.io username (raises the anonymous pull ceiling; dhi base is mandatory).'
    required: true
  docker-registry-token:
    description: 'docker.io / dhi.io token.'
    required: true
  space-packages-token:
    description: 'QODANA_READ_SPACE_PACKAGES_TOKEN — internal nightly feed + private clang-tidy/CLT mirror. Empty on the public path.'
    required: false
    default: ''
  push-registry:
    description: >
      Empty (default) = e2e mode: `docker compose build` loads <image>:dev locally. Set (e.g.
      registry.jetbrains.team/p/sa/qodana-kcli-images) = publish mode: `docker buildx bake` builds this arch
      and pushes it BY DIGEST (no tag) under <push-registry>/<image>, emitting `digest`. The caller must
      `docker login` the registry first. Either way the runtime guard runs — publish mode pulls the pushed
      digest to probe it — so a mis-baked runtime fails loud on any ref, e2e-verified or not.
    required: false
    default: ''

outputs:
  digest:
    description: 'In publish mode, the sha256 digest of the per-arch image pushed by digest.'
    value: ${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    # Reclaim preinstalled toolchains this job never uses (each image provisions its own SDK); dotnet/
    # android otherwise exhaust the ~14 GB-free runner (QD-15127). Runs after checkout (a local action
    # forces checkout first) — benign: free-disk targets system dirs, never the workspace.
    - name: Free runner disk space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: false
        tool-cache: false
    - uses: ./.github/actions/setup-native-build
    - name: Docker Hub login (raise anonymous pull-rate ceiling)
      # Authenticated docker.io pull raises the anonymous rate ceiling for the public base images.
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.docker-registry-user }}
        password: ${{ inputs.docker-registry-token }}
    - name: dhi.io login (Docker Hardened Images base)
      # Mandatory base — a missing credential must fail loudly here, not skip.
      uses: docker/login-action@v4
      with:
        registry: dhi.io
        username: ${{ inputs.docker-registry-user }}
        password: ${{ inputs.docker-registry-token }}
    - name: Require feed token for internal-feed images
      # An internal-feed image with an empty token fails RED on every run (a rotated/missing secret).
      if: ${{ inputs.feed-required == 'true' && inputs.space-packages-token == '' }}
      shell: bash
      run: |
        echo "::error::QODANA_READ_SPACE_PACKAGES_TOKEN is required for ${{ inputs.image }} (internal nightly feed) but is empty."
        echo "This is a rotated or missing repo/environment secret; re-check it."
        exit 1
    - name: Require mirror token for token-gated images
      # Empty token can't build the private clang-tidy/CLT mirror → fail RED (symmetric with the feed gate).
      if: ${{ inputs.token-gated == 'true' && inputs.space-packages-token == '' }}
      shell: bash
      run: |
        echo "::error::QODANA_READ_SPACE_PACKAGES_TOKEN is required for ${{ inputs.image }} (private clang-tidy/CLT mirror) but is empty."
        echo "This is a rotated or missing repo secret; re-check it."
        exit 1
    - name: Resolve version build-args
      # EXPECT_TOOL/EXPECT_VERSION feed the runtime guard below; BUILD_ARGS feeds the build.
      uses: ./.github/actions/retry
      with:
        what: resolve build-args (Gradle → Maven Central)
        timeout-seconds: '1800'
        run: |
          set -euo pipefail
          out="$(mktemp)"; err="$(mktemp)"
          if { ./gradlew :linter-images:installDist \
            && linter-images/build/install/image-tool/bin/image-tool resolve-build-args \
              --image '${{ inputs.image }}' --version '${{ inputs.version }}' > "$out"; } 2>"$err"; then
            cat "$err" >&2
            cat "$out" >> "$GITHUB_ENV"   # only reached on full success → retries stay idempotent
            exit 0
          else
            rc=$?
          fi
          cat "$err" >&2
          grep -qE 'Received status code (403|429|5[0-9][0-9])|Could not (resolve|GET|download)|Connection reset|Read timed out|Connect(ion)? timed out|TLS handshake timeout|Premature end of Content-Length' "$err" && exit 75
          exit "$rc"
    - name: Stage from-tree contexts (build)
      # From-tree inner CLI (CLI_SOURCE=context). Token-gated images also build + stage their own
      # Tool-kind CLI binary so /cli-src/<module> resolves.
      uses: ./.github/actions/retry
      with:
        what: assemble from-tree CLI (Gradle → Maven Central)
        timeout-seconds: '3600'
        run: |
          set -euo pipefail
          token_gated='${{ inputs.token-gated }}'
          targets=(:qodana-cli:assembleRelease -PtargetOs=linux -PtargetArch=${{ inputs.arch }} -Pquick=true)
          # Token-gated images also build their own Tool-kind inner CLI binary from this tree.
          if [ "$token_gated" = "true" ]; then
            targets+=(:${{ inputs.image }}:assembleRelease -PtargetOs=linux -PtargetArch=${{ inputs.arch }} -Pquick=true)
          fi
          targets+=(:linter-images:installDist)
          err="$(mktemp)"
          if ./gradlew "${targets[@]}" 2>"$err"; then cat "$err" >&2; exit 0; else rc=$?; fi
          cat "$err" >&2
          grep -qE 'Received status code (403|429|5[0-9][0-9])|Could not (resolve|GET|download)|Connection reset|Read timed out|Connect(ion)? timed out|TLS handshake timeout|Premature end of Content-Length' "$err" && exit 75
          exit "$rc"
    - name: Stage from-tree contexts (verify + place)
      # Fail-closed: nativeCompile is host-arch; -PtargetArch is only a label, so verify the ELF machine.
      shell: bash
      run: |
        set -euo pipefail
        test -x qodana-cli/build/release-staging/qodana
        want='${{ inputs.arch }}'
        got="$(file -b qodana-cli/build/release-staging/qodana)"
        case "$want" in
          amd64) echo "$got" | grep -q 'x86-64' || { echo "::error::staged CLI is not x86-64 (arch=$want): $got"; exit 1; } ;;
          arm64) echo "$got" | grep -q 'aarch64'  || { echo "::error::staged CLI is not aarch64 (arch=$want): $got"; exit 1; } ;;
          *) echo "::error::unexpected arch '$want'"; exit 1 ;;
        esac
        if [ '${{ inputs.token-gated }}' = "true" ]; then
          shopt -s nullglob
          tool_binaries=(${{ inputs.image }}/build/release/${{ inputs.image }}_*_linux_${{ inputs.arch }})
          if [ "${#tool_binaries[@]}" -ne 1 ]; then
            echo "::error::expected exactly one ${{ inputs.image }} tool binary, found ${#tool_binaries[@]}: ${tool_binaries[*]:-<none>}"
            exit 1
          fi
          cp "${tool_binaries[0]}" "qodana-cli/build/release-staging/${{ inputs.image }}"
          chmod 0755 "qodana-cli/build/release-staging/${{ inputs.image }}"
        fi
    - name: Set up a container builder
      # push-by-digest is unsupported by the default `docker` driver — publish mode needs a
      # docker-container builder. (e2e mode keeps the default driver for `docker compose build` + --load.)
      if: ${{ inputs.push-registry != '' }}
      uses: docker/setup-buildx-action@v3
    - name: Build ${{ inputs.image }}
      id: build
      shell: bash
      env:
        # compose.private.yaml / bake mount this as the space_packages_token build secret (feed sha256 + mirror).
        QODANA_READ_SPACE_PACKAGES_TOKEN: ${{ inputs.space-packages-token }}
      run: |
        set -euo pipefail
        if [ -z '${{ inputs.push-registry }}' ]; then
          # e2e mode: build + load <image>:dev locally for the caller's scan + the runtime guard below.
          # shellcheck disable=SC2086
          docker compose ${{ inputs.compose-files }} build ${BUILD_ARGS} ${{ inputs.image }}
          docker builder prune -af
        else
          # publish mode: build this arch via bake and push it BY DIGEST (no tag). bake reads the same
          # contexts/secret/args from the compose files. Translate resolve-build-args'
          # `--build-arg K=V` tokens into bake `--set <svc>.args.K=V` for the version sub-axis overrides.
          set_args=(); read -ra ba <<< "${BUILD_ARGS:-}"; i=0
          while [ "$i" -lt "${#ba[@]}" ]; do
            if [ "${ba[$i]}" = "--build-arg" ]; then set_args+=(--set "${{ inputs.image }}.args.${ba[$((i+1))]}"); i=$((i+2)); else i=$((i+1)); fi
          done
          # bake resolves `context:`/contexts relative to CWD (unlike compose, which uses the compose-file
          # dir), so run bake FROM linter-images/ with that prefix stripped from the -f flags — then
          # `context: docker` and the cli/tooling contexts resolve exactly as compose intends.
          # --allow=fs.read=..: the `cli` context (../qodana-cli/…) resolves outside that dir; grant it.
          cfiles='${{ inputs.compose-files }}'; cfiles="${cfiles//linter-images\//}"
          # shellcheck disable=SC2086
          # Clear the compose `image:`-derived tag: push-by-digest refuses a tagged ref, so the output
          # must carry only the bare `name=` (repository), pushed untagged and referenced by digest.
          ( cd linter-images && docker buildx bake $cfiles \
            --allow=fs.read=.. \
            --set '${{ inputs.image }}.tags=' \
            --set '${{ inputs.image }}.platform=linux/${{ inputs.arch }}' \
            --set '${{ inputs.image }}.output=type=image,name=${{ inputs.push-registry }}/${{ inputs.image }},push-by-digest=true,push=true' \
            "${set_args[@]}" \
            --metadata-file bake-meta.json \
            ${{ inputs.image }} )
          digest="$(jq -r '."${{ inputs.image }}"."containerimage.digest"' linter-images/bake-meta.json)"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::bake did not emit a sha256 digest: '$digest'"; exit 1; }
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
        fi
    - name: Pull the pushed digest for the runtime guard
      # No local :dev in publish mode — pull the just-pushed per-arch artifact so the guard can probe it offline.
      if: ${{ env.EXPECT_TOOL != 'none' && inputs.push-registry != '' }}
      uses: ./.github/actions/retry
      with:
        what: pull pushed digest (registry)
        run: |
          set -euo pipefail
          img="${{ inputs.push-registry }}/${{ inputs.image }}@${{ steps.build.outputs.digest }}"
          err="$(mktemp)"
          if docker pull "$img" 2>"$err"; then cat "$err" >&2; exit 0; else rc=$?; fi
          cat "$err" >&2
          grep -qE 'received unexpected HTTP status: (429|5[0-9][0-9])|TLS handshake timeout|connection refused|i/o timeout|EOF' "$err" && exit 75
          exit "$rc"
    - name: Verify built runtime version
      # Catch ARG-shadowing (a build-arg silently not applied) by probing the built image for the requested
      # runtime. Runs in BOTH modes: e2e probes the loaded <image>:dev; publish probes the pulled per-arch
      # digest (on-demand publish can build an arbitrary, un-e2e'd ref, so it must gate too). The action's
      # last step, so a caller's scan tail runs after build < guard.
      if: ${{ env.EXPECT_TOOL != 'none' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ -z '${{ inputs.push-registry }}' ]; then
          img="${{ inputs.image }}:dev"
        else
          img="${{ inputs.push-registry }}/${{ inputs.image }}@${{ steps.build.outputs.digest }}"
        fi
        case "$EXPECT_TOOL" in
          ruby)  probe="ruby --version";                                  needle="ruby $EXPECT_VERSION." ;;
          clang) probe="/usr/lib/llvm-$EXPECT_VERSION/bin/clang --version"; needle="version $EXPECT_VERSION." ;;
          *) echo "::error::unknown EXPECT_TOOL=$EXPECT_TOOL"; exit 1 ;;
        esac
        if ! out="$(docker run --rm --network none --entrypoint /bin/sh "$img" -c "$probe" 2>&1)"; then
          echo "::error::runtime guard: '$probe' did not run in $img — the requested runtime is likely not baked (ARG-shadowing?):"
          echo "$out"
          [ "$EXPECT_TOOL" = clang ] && docker run --rm --network none --entrypoint /bin/sh "$img" -c 'ls -d /usr/lib/llvm-* 2>&1 || true'
          [ "$EXPECT_TOOL" = ruby ] && docker run --rm --network none --entrypoint /bin/sh "$img" -c 'command -v ruby; ruby --version 2>&1 || true'
          exit 1
        fi
        echo "$out"
        printf '%s\n' "$out" | grep -qF "$needle" || {
          echo "::error::runtime guard sanity check failed for $img: wanted '$needle', got: $out"; exit 1; }
