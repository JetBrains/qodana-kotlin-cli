default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Convenience auto-fixers for final-newline and trailing-whitespace only.
      # The full editorconfig policy (charset, EOL, indent_style, ...) is validated
      # by editorconfig-checker below; these hooks just save typing on the two
      # cases they cover. The trailing-whitespace exclude mirrors
      # .editorconfig's [*.md] trim_trailing_whitespace = false.
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.md$'
      # Check-only safety nets.
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Reads .editorconfig directly. The policy lives entirely in .editorconfig:
  # it omits indent_size for languages owned by specialized formatters
  # (Kotlin via ktlint, Markdown via Prettier) and unsets enforcement for
  # tool-generated / imported files (Gradle wrapper, Apache LICENSE).
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        stages: [pre-commit]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        types: [markdown]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: resolve-hadolint
        name: resolve + hadolint
        # hadolint via hadolint-py (pip; no Docker, no manual install), pinned + Renovate-trackable;
        # npx resolves the dockerfile-x thin files. Runs locally and in CI (ci.yaml runs prek).
        language: python
        additional_dependencies:
          - "hadolint-py @ git+https://github.com/AleksaC/hadolint-py.git@v2.14.0"
        entry: linter-images/docker/prek-resolve-hadolint.sh
        files: ^linter-images/docker/
        pass_filenames: false
      - id: gradle-ktlint-format
        name: gradle ktlintFormat (auto-fix on push)
        entry: ./gradlew --console=plain ktlintFormat
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
      - id: gradle-detekt
        name: gradle detekt (check on push)
        entry: ./gradlew --console=plain detekt
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
      # QD-14721 Phase C — enforce the version invariant (gradle.properties source-of-truth
      # is either "dev", matches the most recent stable `v*` tag, or is exactly one bump ahead).
      - id: gradle-check-version
        name: gradle checkVersion (release invariant)
        entry: ./gradlew --console=plain --quiet :release-tools:checkVersion
        language: system
        pass_filenames: false
        stages: [pre-push]
      # QD-14721 Phase C — guard against accidental reintroduction of the
      # `qodana.version` / `QODANA_VERSION` runtime read in any *.kt / *.kts / *.java file
      # outside the two authorized locations (QodanaCommand.kt and SystemUtilsTest.kt).
      # See docs/release.md for the rationale.
      - id: no-residual-version-reads
        name: no residual qodana.version reads
        entry: bash -c 'set -euo pipefail; MATCHES=$(git grep -nE "(getProperty|getenv)\(.qodana\.version.|QODANA_VERSION" -- "*.kt" "*.kts" "*.java" | grep -v "QodanaCommand\.kt\|SystemUtilsTest\.kt" || true); if [ -n "$MATCHES" ]; then echo "Residual qodana.version / QODANA_VERSION reads found outside QodanaCommand.kt and SystemUtilsTest.kt:"; printf "%s\n" "$MATCHES"; exit 1; fi'
        language: system
        pass_filenames: false
        stages: [pre-push]
