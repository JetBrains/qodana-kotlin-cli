default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Convenience auto-fixers for final-newline and trailing-whitespace only.
      # The full editorconfig policy (charset, EOL, indent_style, ...) is validated
      # by editorconfig-checker below; these hooks just save typing on the two
      # cases they cover. The trailing-whitespace exclude mirrors
      # .editorconfig's [*.md] trim_trailing_whitespace = false.
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '\.md$'
      # Check-only safety nets.
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Reads .editorconfig directly. The policy lives entirely in .editorconfig:
  # it omits indent_size for languages owned by specialized formatters
  # (Kotlin via ktlint, Markdown via Prettier) and unsets enforcement for
  # tool-generated / imported files (Gradle wrapper, Apache LICENSE).
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        stages: [pre-commit]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        types: [markdown]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: gradle-ktlint-format
        name: gradle ktlintFormat (auto-fix on push)
        entry: ./gradlew --console=plain ktlintFormat
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
      - id: gradle-detekt
        name: gradle detekt (check on push)
        entry: ./gradlew --console=plain detekt
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
