default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Convenience auto-fixers. Policy authority is .editorconfig (validated by editorconfig-checker below).
      # These behave equivalently to .editorconfig's globally-applicable rules; the exclude on
      # trailing-whitespace mirrors [*.md] trim_trailing_whitespace = false.
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: '(?i)\.md$'
      # Check-only safety nets.
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        stages: [pre-commit]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        types: [markdown]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: gradle-ktlint-format
        name: gradle ktlintFormat (auto-fix on push)
        entry: ./gradlew --console=plain ktlintFormat
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
      - id: gradle-detekt
        name: gradle detekt (check on push)
        entry: ./gradlew --console=plain detekt
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
