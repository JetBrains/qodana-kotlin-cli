# Single source of hadolint config for resolved dockerfile-x output.
# CI's fast job uses this file verbatim; no inline --ignore flags anywhere.
#
# NO trustedRegistries: every base in this design is ARG-interpolated (`FROM ${QD_BASE_IMAGE}`,
# `FROM ${JDK_BUILDER_IMAGE}`, `FROM ${CLI_BASE_STAGE}`), so hadolint cannot resolve the registry
# behind the variable and DL3026 would fire on every stage (false positive). The real guarantee is
# stronger and lives elsewhere: `.env` bases are pinned by sha256 digest and EnvContractTest asserts
# `QD_BASE_IMAGE` is the exact dhi.io digest from phase-0-decisions.md.
failure-threshold: warning
ignored:
  - DL3007 # base is pinned by digest (FROM ...@sha256:...); tag/latest rules are moot
  - DL3008 # apt versions float by moving LLVM/NodeSource repo + Debian codename
  - DL3009 # apt-list cleanup is owned + asserted by the toolchain/* includes
  - DL3015 # --no-install-recommends discipline is owned by the includes, not hadolint heuristics
  - DL3020 # ADD --checksum= is the sanctioned sha-verified remote-fetch pattern (tini, Android SDK)
  - DL3002 # base stages build as root (the dhi.io base defaults to nonroot, apt needs root); the
           # TERMINAL runtime stage drops to USER 1000:1000, so the shipped image is non-root. DL3002
           # fires per-stage and cannot see that base/builder are intermediate.
