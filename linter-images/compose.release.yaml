# Release profile overlay — builds the public-release-equivalent image, token-free. Each dist service
# overrides the nightly `.env` back to the public feed + GPG and its seeded public release pin. Usage:
#   docker compose -f compose.yaml -f compose.release.yaml build qodana-jvm
# Pins are advanced deliberately; they are anchored to the QODANA_<X>_RELEASE_* rows in
# docs/phase-0-decisions.md (ReleaseProfileContractTest). Every dist image is now on the internal nightly
# feed, so each row here genuinely flips it back to the public dist — none is an inert `.env` mirror.
services:
  qodana-jvm:
    build:
      args:
        QD_DISTRIBUTION_FEED: https://download.jetbrains.com/qodana/feed
        QD_VERIFY_MODE: gpg
        QD_VERSION: "2026.1"
        QD_BUILD: "261.25881"
  qodana-jvm-community:
    build:
      args:
        QD_DISTRIBUTION_FEED: https://download.jetbrains.com/qodana/feed
        QD_VERIFY_MODE: gpg
        QD_VERSION: "2026.1"
        QD_BUILD: "261.25881"
