# Private-source overlay. A SINGLE read-only token, QODANA_READ_SPACE_PACKAGES_TOKEN, reads every
# private JetBrains Space package the build needs, exposed as the `space_packages_token` build secret:
#   - the internal nightly IDE dist feed (qodana-dist-internal) — dist images mount it in
#     lib/dist.dockerfile required=false, so the PUBLIC path builds with the token unset;
#   - the qodana-cli-deps mirror (clang-tidy / ReSharper CLT) — clang/cdnet mount it in
#     lib/tools.dockerfile / lib/resharper-clt.dockerfile required=true (they cannot build without it).
# The token is sent as `Authorization: Bearer <token>` (a JB Space bearer token, raw value — not
# `user:pass`), matching lib/tools.dockerfile and the canonical qodana-cli download-clang-tidy.go.
# Usage:
#   QODANA_READ_SPACE_PACKAGES_TOKEN=<token> docker compose -f compose.yaml -f compose.private.yaml build qodana-jvm
# The base compose.yaml references no secret, so the public jvm/android path builds with the token unset.
services:
  qodana-jvm:
    build:
      secrets:
        - space_packages_token
  qodana-jvm-community:
    build:
      secrets:
        - space_packages_token
  qodana-android:
    build:
      secrets:
        - space_packages_token
  qodana-android-community:
    build:
      secrets:
        - space_packages_token
  qodana-python-community:
    build:
      secrets:
        - space_packages_token
  qodana-python:
    build:
      secrets:
        - space_packages_token
  qodana-js:
    build:
      secrets:
        - space_packages_token
  qodana-go:
    build:
      secrets:
        - space_packages_token
  qodana-php:
    build:
      secrets:
        - space_packages_token
  qodana-rust:
    build:
      secrets:
        - space_packages_token
  qodana-ruby:
    build:
      secrets:
        - space_packages_token
  qodana-ruby-3.2:
    build:
      secrets:
        - space_packages_token
  qodana-ruby-3.4:
    build:
      secrets:
        - space_packages_token
  qodana-dotnet:
    build:
      secrets:
        - space_packages_token
  qodana-cpp:
    build:
      secrets:
        - space_packages_token
  qodana-clang:
    build:
      secrets:
        - space_packages_token
  qodana-cdnet:
    build:
      secrets:
        - space_packages_token

secrets:
  space_packages_token:
    environment: QODANA_READ_SPACE_PACKAGES_TOKEN
