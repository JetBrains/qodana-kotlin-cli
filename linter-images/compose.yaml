# Public/release reconstruction path: `docker login dhi.io` (free) + `./gradlew :linter-images:installDist`,
# then `docker compose build <slug>`. The inner CLI is fetched inside the builder stage (CLI_SOURCE=release);
# the build `image-tool` always comes from the repo via the `tooling` context (installDist tree). CI layers
# compose.ci.yaml to switch to CLI_SOURCE=context; the private feed uses compose.private.yaml for the token.
#
# CLI_RELEASE_BASE_URL pins the GitHub release the inner CLI is downloaded from (install-cli forms
# ${CLI_RELEASE_BASE_URL}/qodana_<os>_<arch>.tar.gz). The release TAG must be in the URL. It is a build
# arg (Renovate-tracked), NOT an .env contract key. NOTE: nightly tags are pruned of their assets after
# the 7 newest nightlies (docs/release.md) — Renovate must bump this to a retained tag, or switch the
# default to a stable `v<MAJOR>` release once one carries the linux/amd64 asset.
#
# Multiarch platform policy (per-file): the arch-capable services follow the build host's arch
# (TARGETARCH) and carry NO `platform:` pin; every OTHER service keeps `platform: linux/amd64` — its
# toolchain layers are still amd64-only (QD-15171), so an arm64 host must not build a broken mixed-arch
# image. The arch-capable set is the test-enforced source of truth `ArchContract.archCapable`
# (ComposeContractTest asserts the no-pin services equal it) — consult that set for the current members
# rather than re-enumerating here (grown per image-family under QD-15171).
services:
  qodana-jvm:
    build:
      context: docker
      dockerfile: images/qodana-jvm.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
      additional_contexts:
        tooling: build/install/image-tool
    # No platform pin: arch-capable (multiarch). See the per-file "Multiarch platform policy" header.
    image: qodana-jvm:dev
  qodana-jvm-community:
    build:
      context: docker
      dockerfile: images/qodana-jvm-community.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-jvm-community:dev
  qodana-android:
    build:
      context: docker
      dockerfile: images/qodana-android.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
      additional_contexts:
        tooling: build/install/image-tool
    platform: linux/amd64
    image: qodana-android:dev
  qodana-android-community:
    build:
      context: docker
      dockerfile: images/qodana-android-community.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
      additional_contexts:
        tooling: build/install/image-tool
    platform: linux/amd64
    image: qodana-android-community:dev
  qodana-python-community:
    build:
      context: docker
      dockerfile: images/qodana-python-community.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-python-community:dev
  qodana-python:
    build:
      context: docker
      dockerfile: images/qodana-python.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-python:dev
  qodana-js:
    build:
      context: docker
      dockerfile: images/qodana-js.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # The dhi.io/node base ships a `node` user at uid/gid 1000, so the qodana user shifts to 1001.
        # Passed as build ARGs (NOT .env keys): dockerfile-x's INCLUDE_ARGS emits each .env key as an
        # `ARG NAME="val"` default that base.dockerfile's own `ARG QODANA_UID=1000` (emitted later) would
        # clobber back to 1000; a --build-arg always wins. base.dockerfile defaults these to 1000, so the
        # existing debian-base images that omit them are unaffected.
        QODANA_UID: "1001"
        QODANA_GID: "1001"
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-js:dev
  qodana-go:
    build:
      context: docker
      dockerfile: images/qodana-go.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # No QODANA_UID/GID override: the dhi.io/golang base does NOT occupy uid 1000 (unlike the node
        # base), so qodana-go keeps base.dockerfile's default 1000, like the debian-base images.
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-go:dev
  qodana-php:
    build:
      context: docker
      dockerfile: images/qodana-php.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # No QODANA_UID/GID override: the dhi.io/php base does NOT occupy uid 1000 (like the golang base,
        # unlike the node base), so qodana-php keeps base.dockerfile's default 1000.
      additional_contexts:
        tooling: build/install/image-tool
    platform: linux/amd64
    image: qodana-php:dev
  qodana-rust:
    build:
      context: docker
      dockerfile: images/qodana-rust.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # No QODANA_UID/GID override: the trixie debian-base does NOT occupy uid 1000, so qodana-rust
        # keeps base.dockerfile's default 1000, like the other debian-base images. No CLI_BASE_STAGE
        # override (rust has a dist, so the inner CLI layers onto the `dist` default) and no
        # PRIVILEGED_BASE_STAGE (rust is not privileged). The dist's DIST_BASE_STAGE=rust-toolchain
        # lives in the .env (base.dockerfile does not declare it, so the INCLUDE_ARGS value survives).
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-rust:dev
  qodana-ruby:
    build:
      context: docker
      dockerfile: images/qodana-ruby.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # Ruby's privileged sudo layer sits on `base` (node+eslint+ruby are in-place there).
        # PRIVILEGED_BASE_STAGE=base is a build ARG ONLY: base.dockerfile defaults it to clang-toolchain,
        # which would clobber an .env value, so --build-arg must win (the cdnet convention). The dist's
        # DIST_BASE_STAGE=privileged is NOT here — it lives in the .env (base.dockerfile does not default
        # it, so the INCLUDE_ARGS value survives; the android/php convention). No QODANA_UID/GID override:
        # the dhi.io/ruby base does NOT occupy uid 1000, so ruby keeps base.dockerfile's default 1000.
        PRIVILEGED_BASE_STAGE: base
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-ruby:dev
  qodana-ruby-3.2:
    build:
      context: docker
      dockerfile: images/qodana-ruby-3.2.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # Ruby 3.2 variant: same wiring as qodana-ruby, differing only in QD_BASE_IMAGE (the .env).
        PRIVILEGED_BASE_STAGE: base
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-ruby-3.2:dev
  qodana-ruby-3.4:
    build:
      context: docker
      dockerfile: images/qodana-ruby-3.4.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # Ruby 3.4 variant: same wiring as qodana-ruby, differing only in QD_BASE_IMAGE (the .env).
        PRIVILEGED_BASE_STAGE: base
      additional_contexts:
        tooling: build/install/image-tool
    image: qodana-ruby-3.4:dev
  qodana-dotnet:
    build:
      context: docker
      dockerfile: images/qodana-dotnet.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # dotnet's privileged sudo layer sits on the .NET toolchain (node+eslint are in-place on base, then
        # dotnet-toolchain FROMs base and inherits them). PRIVILEGED_BASE_STAGE=dotnet-toolchain is a build
        # ARG ONLY: base.dockerfile defaults it to clang-toolchain, which would clobber an .env value, so
        # --build-arg must win (the cdnet convention). The dist's DIST_BASE_STAGE=privileged is NOT here — it
        # lives in the .env (base.dockerfile does not default it, so the INCLUDE_ARGS value survives; the
        # android/php/ruby convention). No CLI_BASE_STAGE override (dotnet has a dist, so the inner CLI layers
        # onto the `dist` default). No QODANA_UID/GID override: the trixie debian-base does NOT occupy uid
        # 1000, so dotnet keeps base.dockerfile's default 1000.
        PRIVILEGED_BASE_STAGE: dotnet-toolchain
      additional_contexts:
        tooling: build/install/image-tool
    platform: linux/amd64
    image: qodana-dotnet:dev
  qodana-cpp:
    build:
      context: docker
      dockerfile: images/qodana-cpp.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # cpp REUSES the clang toolchain (node+eslint append onto clang-toolchain), so its privileged
        # layer sits on `clang-toolchain` — base.dockerfile's PRIVILEGED_BASE_STAGE default — and cpp sets
        # NO override (the qodana-clang convention; ruby/dotnet must override because their node+eslint sit
        # on base). The dist's DIST_BASE_STAGE=privileged lives in the .env (base.dockerfile does not
        # default it, so the INCLUDE_ARGS value survives — the android/php/ruby/dotnet convention). No
        # CLI_BASE_STAGE override (cpp has a dist). No QODANA_UID/GID override: the trixie base does not
        # occupy uid 1000, so cpp keeps base.dockerfile's default 1000.
      additional_contexts:
        tooling: build/install/image-tool
    platform: linux/amd64
    image: qodana-cpp:dev
  qodana-clang:
    build:
      context: docker
      dockerfile: images/qodana-clang.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # clang has NO dist stage: the inner CLI layers onto `tools` (clang-tidy), not `dist`.
        # CLI_BASE_STAGE is a build ARG (base.dockerfile defaults it to dist), not an .env key.
        CLI_BASE_STAGE: tools
      additional_contexts:
        tooling: build/install/image-tool
    platform: linux/amd64
    image: qodana-clang:dev
  qodana-cdnet:
    build:
      context: docker
      dockerfile: images/qodana-cdnet.dockerfile
      args:
        CLI_SOURCE: release
        CLI_RELEASE_BASE_URL: https://github.com/JetBrains/qodana-kotlin-cli/releases/download/v2026.2.1-nightly.20260605
        # cdnet has NO dist stage: the inner CLI layers onto `tools` (the CLT), not `dist`. And its
        # privileged layer sits on the .NET toolchain, not clang's. Both are build ARGs, not .env keys.
        CLI_BASE_STAGE: tools
        PRIVILEGED_BASE_STAGE: dotnet-toolchain
      additional_contexts:
        tooling: build/install/image-tool
    platform: linux/amd64
    image: qodana-cdnet:dev
